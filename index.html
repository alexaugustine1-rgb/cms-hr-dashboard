          </div>
          <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace;letter-spacing:.5px;text-transform:uppercase;color:${FN_COLORS[u.function_type]||'var(--muted)'};background:rgba(0,0,0,.2)">${FN_LABELS[u.function_type]||u.function_type}</span>
        </div>`).join('')}
    </div>` : ''}
  </div>`;
}

// ── INIT (v3 compatible) ─────────────────────────────────────────────────
function init() {
  const wKeys = WEEK_ORDER.filter(k => WEEKS_DATA[k]);
  const latestKey = wKeys[wKeys.length - 1];
  currentWeek = latestKey;

  // Clear and rebuild week buttons
  const container = document.getElementById('weekBtns');
  if (container) {
    container.innerHTML = '';
    wKeys.forEach((key, i) => {
      const w = WEEKS_DATA[key];
      const btn = document.createElement('button');
      btn.className = 'week-btn' + (key === latestKey ? ' active latest' : '');
      btn.textContent = (WEEK_NAMES[key] || key) + '  ' + w.label;
      btn.onclick = () => {
        currentWeek = key;
        document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      };
      container.appendChild(btn);
    });
  }
  render();
}

// ── SUPABASE AUTH ─────────────────────────────────────────────────────────
async function sbLogin() {
  const email=document.getElementById('sbEmail').value.trim();
  const pwd=document.getElementById('sbPwd').value;
  const btn=document.getElementById('sbLoginBtn');
  const err=document.getElementById('sbErr');
  err.innerHTML=''; btn.disabled=true; btn.textContent='SIGNING IN…';
  const {data,error}=await _sb.auth.signInWithPassword({email,password:pwd});
  btn.disabled=false; btn.textContent='SIGN IN';
  if(error){
    err.innerHTML=`<div style="margin-top:12px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:#fca5a5;font-size:12px;padding:10px 14px;border-radius:8px">${error.message}</div>`;
    return;
  }
  await sbBoot(data.user);
}

async function sbBoot(user) {
  _sbUser=user;
  const {data:profile}=await _sb.from('user_profiles').select('role,region').eq('id',user.id).single();
  _sbRole=profile||{role:'viewer',region:null};

  // Load all weeks from Supabase
  const {data:weeks,error}=await _sb.from('weekly_reports').select('*').order('week_num',{ascending:true});
  if(!error&&weeks&&weeks.length>0){
    WEEKS_DATA={};
    weeks.forEach(w=>{WEEKS_DATA[w.week_key]=w;});
    WEEK_ORDER=weeks.map(w=>w.week_key);
    weeks.forEach(w=>{
      WEEK_LABELS[w.week_key]=w.label||'';
      WEEK_NAMES[w.week_key]='Week '+w.week_num+(w.week_key===WEEK_ORDER[WEEK_ORDER.length-1]?' (Latest)':'');
    });
    window.WEEK_ORDER_LIVE=WEEK_ORDER;
    currentWeek=WEEK_ORDER[WEEK_ORDER.length-1];
  }

  // Show dashboard
  document.getElementById('authOverlay').style.display='none';
  document.getElementById('dashApp').style.display='block';

  // Show submit tab for all roles
  const st2=document.getElementById('tab-btn-submit');
  if(st2) st2.style.display='';

  // Show admin-only tabs
  if(_sbRole.role==='admin'){
    const upl = document.getElementById('tab-btn-upload');
    const usr = document.getElementById('tab-btn-users');
    if(upl) upl.style.display='';
    if(usr) usr.style.display='';
  }

  // Add sign-out button to header
  const hr=document.querySelector('.header-right');
  if(hr&&!document.getElementById('sbSignOutBtn')){
    const b=document.createElement('button');
    b.id='sbSignOutBtn'; b.textContent='Sign out'; b.className='btn-outline';
    b.style.cssText='margin-left:12px;font-size:12px;cursor:pointer';
    b.onclick=sbSignOut; hr.appendChild(b);
    // Add role badge
    const rb=document.createElement('span');
    const _RL2={'admin':'CXO','executive':'CXO','hrbp':'Lead'};
    const _RC2={
      'admin':'color:#60a5fa;background:rgba(96,165,250,.12)',
      'executive':'color:#60a5fa;background:rgba(96,165,250,.12)',
      'hrbp':'color:#34d399;background:rgba(52,211,153,.1)'
    };
    rb.style.cssText='margin-left:8px;font-family:\'DM Mono\',monospace;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:20px;'+(_RC2[_sbRole.role]||'color:#a78bfa;background:rgba(167,139,250,.12)');
    rb.textContent=_RL2[_sbRole.role]||_sbRole.role.toUpperCase();
    hr.appendChild(rb);
  }

  // Build week buttons and render
  init();
}

async function sbSignOut(){
  await _sb.auth.signOut();
  document.getElementById('dashApp').style.display='none';
  document.getElementById('authOverlay').style.display='flex';
  _sbUser=null; _sbRole=null; WEEKS_DATA={}; WEEK_ORDER=[];
  const so=document.getElementById('sbSignOutBtn'); if(so)so.remove();
}

// ── INIT ──────────────────────────────────────────────────────────────────
(async()=>{
  const {data:{session}}=await _sb.auth.getSession();
  if(session?.user)await sbBoot(session.user);

  ['sbEmail','sbPwd'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.addEventListener('keydown',e=>{
      if(e.key==='Enter'){id==='sbEmail'?document.getElementById('sbPwd').focus():sbLogin();}
    });
    el.addEventListener('focus',()=>{el.style.borderColor='#60a5fa';});
    el.addEventListener('blur',()=>{el.style.borderColor='#2a3d52';});
  });
})();
