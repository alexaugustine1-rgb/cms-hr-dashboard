
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Ops Command Centre ⚡ — CMS IT Services</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#0f1923;--surface:#172130;--surface2:#1c2a3a;--surface3:#223244;--border:#2a3d52;--border2:#344d66;--accent:#60a5fa;--accent-glow:rgba(96,165,250,.12);--green:#34d399;--green-glow:rgba(52,211,153,.1);--amber:#fbbf24;--amber-glow:rgba(251,191,36,.1);--red:#f87171;--red-glow:rgba(248,113,113,.1);--purple:#c084fc;--text:#e2e8f0;--muted:#8aa0bc;--muted2:#546e8a}

/* ── LIGHT THEME ──────────────────────────────────────────────────── */
body.light-mode {
  --bg:#f0f4f8;--surface:#ffffff;--surface2:#f8fafc;--surface3:#edf2f7;--border:#d1dbe6;--border2:#b8c8d8;--accent:#2563eb;
  --accent-glow:rgba(37,99,235,.1);--green:#16a34a;--green-glow:rgba(22,163,74,.1);--amber:#d97706;--amber-glow:rgba(217,119,6,.1);
  --red:#dc2626;--red-glow:rgba(220,38,38,.1);--purple:#7c3aed;--text:#1e293b;--muted:#475569;--muted2:#64748b;
}
body.light-mode .header{background:linear-gradient(180deg,rgba(37,99,235,.04) 0%,transparent 100%);border-bottom:1px solid var(--border);}
body.light-mode .sidebar{box-shadow:2px 0 12px rgba(0,0,0,.08);}
body.light-mode .sidebar-item:hover{background:rgba(37,99,235,.06);}
body.light-mode .sidebar-item.active{background:rgba(37,99,235,.1);}
body.light-mode .tab-content{background:var(--bg);}
body.light-mode .wi-card, body.light-mode [class*="card"]{box-shadow:0 1px 4px rgba(0,0,0,.06);}
body.light-mode .week-btn.active{background:var(--accent);color:#fff;}

.theme-toggle{background:none;border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:5px;}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent)}

*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,158,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(59,158,255,.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

/* HEADER */
.header{position:relative;z-index:10;padding:22px 36px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;background:linear-gradient(180deg,rgba(59,158,255,.05) 0%,transparent 100%)}
.header-left .label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
.header-left h1{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px;line-height:1}
.header-left h1 span{color:var(--accent)}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.live-badge{display:inline-flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:7px 14px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;width:240px;height:100vh;background:var(--surface2);border-right:1px solid var(--border);z-index:200;display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:thin}
.sidebar-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);letter-spacing:1px}
.sidebar-body{flex:1;padding:12px 0}
.sidebar-group{margin-bottom:8px}
.sidebar-group-label{font-family:'DM Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted2);padding:8px 20px 4px}
.sidebar-item{display:flex;align-items:center;gap:12px;padding:10px 20px;font-size:13px;color:var(--muted);cursor:pointer;border-left:3px solid transparent;transition:all .15s;background:none;border-right:none;border-top:none;border-bottom:none;width:100%;text-align:left}
.sidebar-item:hover{background:rgba(255,255,255,.05);color:var(--text)}
.sidebar-item.active{color:var(--accent);background:rgba(96,165,250,.08);border-left-color:var(--accent)}
.sidebar-item .item-icon{font-size:16px;width:22px;flex-shrink:0}
.sidebar-item .item-label{flex:1}

/* MAIN CONTENT */
.main-content{margin-left:240px;padding-top:140px;min-height:100vh}
.week-bar{position:fixed;top:88px;left:240px;right:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:0 36px;display:flex;gap:0;justify-content:space-between;align-items:center}
.week-bar-left{display:flex;gap:0}
.week-btn{padding:13px 20px;font-family:'DM Mono',monospace;font-size:11px;border:none;border-bottom:2px solid transparent;background:none;color:var(--muted);cursor:pointer;transition:all .2s;letter-spacing:.5px}
.week-btn:hover{color:var(--text)}
.week-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.week-btn.latest::after{content:'LATEST';font-size:8px;vertical-align:super;margin-left:4px;color:var(--green);letter-spacing:1px}
.tab-content{position:relative;z-index:1;padding:32px 36px 80px;background:var(--bg)}

/* CARDS & LAYOUT */
.section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px}
.card-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-weight:600;font-size:14px;color:var(--text);display:flex;align-items:center;gap:8px}
.card-badge{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:6px;background:var(--surface3);color:var(--muted);letter-spacing:.5px}
.card-badge.blue{background:var(--accent-glow);color:var(--accent)}
.card-badge.green{background:var(--green-glow);color:var(--green)}
.card-badge.amber{background:var(--amber-glow);color:var(--amber)}
.card-badge.red{background:var(--red-glow);color:var(--red)}
.card-body{padding:24px}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:32px}
.kpi-card{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:20px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;opacity:.6}
.kpi-card.blue::before{background:var(--accent)}
.kpi-card.green::before{background:var(--green)}
.kpi-card.amber::before{background:var(--amber)}
.kpi-card.red::before{background:var(--red)}
.kpi-card.purple::before{background:var(--purple)}
.kpi-icon{font-size:24px;margin-bottom:8px}
.kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted2);margin-bottom:8px}
.kpi-value{font-size:32px;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1}
.kpi-wow{font-family:'DM Mono',monospace;font-size:10px;padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:6px}
.kpi-wow.up{background:var(--green-glow);color:var(--green)}
.kpi-wow.down{background:var(--red-glow);color:var(--red)}
.kpi-wow.neutral{background:var(--surface3);color:var(--muted)}
.kpi-sub{font-size:11px;color:var(--muted)}

/* LEADERBOARD TABLES */
.leaderboard-table{width:100%;border-collapse:collapse}
.leaderboard-table thead th{padding:12px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);border-bottom:1px solid var(--border);font-weight:600}
.leaderboard-table tbody td{padding:14px 12px;border-bottom:1px solid var(--border);font-size:13px}
.leaderboard-table tbody tr:hover{background:var(--surface3)}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;font-weight:700;font-size:14px}
.rank-1{background:linear-gradient(135deg,#ffd700,#ffed4e);color:#1a1a1a}
.rank-2{background:linear-gradient(135deg,#c0c0c0,#e8e8e8);color:#1a1a1a}
.rank-3{background:linear-gradient(135deg,#cd7f32,#e6a85c);color:#fff}
.rank-other{background:var(--surface3);color:var(--muted)}
.score-cell{font-family:'DM Mono',monospace;font-size:18px;font-weight:700}
.score-excellent{color:var(--green)}
.score-good{color:var(--accent)}
.score-needs-improvement{color:var(--amber)}
.score-critical{color:var(--red)}
.region-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;background:var(--surface3);color:var(--muted)}

/* METRIC BREAKDOWN */
.metric-breakdown{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}
.metric-item{background:var(--surface3);border-radius:6px;padding:12px;text-align:center}
.metric-item-label{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted2);margin-bottom:4px}
.metric-item-value{font-size:16px;font-weight:700;color:var(--text)}
.metric-item-target{font-size:10px;color:var(--muted);margin-top:2px}

/* REGIONAL CARDS */
.regional-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-bottom:32px}
.regional-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.regional-header{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--text);display:flex;align-items:center;justify-content:space-between}
.regional-section{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.regional-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.regional-section-title{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted2);margin-bottom:10px}
.regional-metric{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px}
.regional-metric-label{color:var(--muted)}
.regional-metric-value{color:var(--text);font-weight:600}
.status-indicator{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px}
.status-excellent{background:var(--green-glow);color:var(--green)}
.status-good{background:var(--accent-glow);color:var(--accent)}
.status-needs-attention{background:var(--amber-glow);color:var(--amber)}
.status-critical{background:var(--red-glow);color:var(--red)}

/* ALERTS */
.alert-section{margin-bottom:32px}
.alert-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.alert-box.critical{border-left:4px solid var(--red);background:var(--red-glow)}
.alert-box.high-priority{border-left:4px solid var(--amber);background:var(--amber-glow)}
.alert-box.monitor{border-left:4px solid var(--accent);background:var(--accent-glow)}
.alert-header{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.alert-header.critical{color:var(--red)}
.alert-header.high-priority{color:var(--amber)}
.alert-header.monitor{color:var(--accent)}
.alert-item{padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.6}
.alert-item:last-child{border-bottom:none;padding-bottom:0}
.alert-item-title{font-weight:600;color:var(--text);margin-bottom:4px}
.alert-item-detail{color:var(--muted);font-size:12px}

/* SETTINGS FORM */
.settings-section{margin-bottom:48px}
.settings-header{padding-bottom:16px;border-bottom:2px solid var(--border);margin-bottom:24px}
.settings-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px}
.settings-subtitle{font-size:13px;color:var(--muted)}
.settings-group{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:20px}
.settings-group-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.form-row{margin-bottom:20px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;max-width:200px;background:var(--surface3);border:1px solid var(--border2);border-radius:6px;padding:10px 14px;color:var(--text);font-size:14px;font-family:'DM Mono',monospace}
.form-input:focus{outline:none;border-color:var(--accent)}
.form-help{font-size:11px;color:var(--muted);margin-top:4px}
.settings-actions{display:flex;gap:12px;padding-top:24px;border-top:1px solid var(--border)}
.btn{padding:12px 24px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-secondary{background:var(--surface3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--surface2)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{opacity:.9}

/* UTILITIES */
.empty-state{padding:40px;text-align:center;color:var(--muted);font-size:13px}
.text-sm{font-size:12px}
.text-muted{color:var(--muted)}
.mb-4{margin-bottom:16px}
.mt-4{margin-top:16px}

/* ANIMATIONS */
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.animate{animation:fadeInUp .4s ease-out forwards}
.d1{animation-delay:.05s}
.d2{animation-delay:.1s}
.d3{animation-delay:.15s}
.d4{animation-delay:.2s}
.d5{animation-delay:.25s}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="sbLoginScreen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)">
  <div style="width:100%;max-width:420px;padding:40px;background:var(--surface);border:1px solid var(--border);border-radius:16px">
    <div style="text-align:center;margin-bottom:32px">
      <h1 style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px">HR <span style="color:var(--accent)">OPS</span></h1>
      <p style="font-size:12px;color:var(--muted);margin-top:8px">CMS IT Services · Command Centre</p>
    </div>
    <div style="margin-bottom:20px">
      <label style="display:block;font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Email</label>
      <input type="email" id="sbEmail" placeholder="your.email@cms.com" autocomplete="email"
        style="width:100%;background:var(--surface3);border:1px solid var(--border2);border-radius:8px;padding:11px 14px;color:var(--text);font-size:14px;outline:none">
    </div>
    <div style="margin-bottom:24px">
      <label style="display:block;font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Password</label>
      <input type="password" id="sbPwd" placeholder="••••••••" autocomplete="current-password"
        style="width:100%;background:var(--surface3);border:1px solid var(--border2);border-radius:8px;padding:11px 14px;color:var(--text);font-size:14px;outline:none">
    </div>
    <button id="sbLoginBtn" onclick="sbLogin()"
      style="width:100%;background:var(--accent);color:#0f1923;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer">SIGN IN</button>
    <div id="sbErr" style="margin-top:16px;padding:12px;border-radius:6px;font-size:12px;display:none"></div>
  </div>
</div>

<!-- MAIN APP (hidden until login) -->
<div id="appContainer" style="display:none">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">HR OPS</div>
      <button class="theme-toggle" onclick="toggleTheme()">
        <span id="themeIcon">🌙</span>
      </button>
    </div>
    <div class="sidebar-body">
      <div class="sidebar-group">
        <div class="sidebar-group-label">Dashboard</div>
        <button class="sidebar-item active" onclick="switchTab('overview')">
          <span class="item-icon">📊</span>
          <span class="item-label">Overview</span>
        </button>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-label">Talent Acquisition</div>
        <button class="sidebar-item" onclick="switchTab('ta_pipeline')">
          <span class="item-icon">🎯</span>
          <span class="item-label">TA Pipeline</span>
        </button>
        <button class="sidebar-item" onclick="switchTab('ta_commitments')">
          <span class="item-icon">📋</span>
          <span class="item-label">TA Commitments</span>
        </button>
        <button class="sidebar-item" onclick="switchTab('resignations')">
          <span class="item-icon">👋</span>
          <span class="item-label">Resignation & Backfill</span>
        </button>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-label">HRBP & Relations</div>
        <button class="sidebar-item" onclick="switchTab('hrbp_connects')">
          <span class="item-icon">🤝</span>
          <span class="item-label">HRBP Connects</span>
        </button>
        <button class="sidebar-item" onclick="switchTab('long_absenteeism')">
          <span class="item-icon">⚠️</span>
          <span class="item-label">Long Absenteeism</span>
        </button>
        <button class="sidebar-item" onclick="switchTab('od_wfh')">
          <span class="item-icon">🏠</span>
          <span class="item-label">OD / WFH</span>
        </button>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-label">HR Operations</div>
        <button class="sidebar-item" onclick="switchTab('hr_ops')">
          <span class="item-icon">⚙️</span>
          <span class="item-label">HR Ops & Payroll</span>
        </button>
        <button class="sidebar-item" onclick="switchTab('fnf')">
          <span class="item-icon">💼</span>
          <span class="item-label">FnF Tracker</span>
        </button>
        <button class="sidebar-item" onclick="switchTab('lnd')">
          <span class="item-icon">📚</span>
          <span class="item-label">L&D</span>
        </button>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-label">Intelligence</div>
        <button class="sidebar-item" onclick="switchTab('workforce_intel')">
          <span class="item-icon">📈</span>
          <span class="item-label">Workforce Intel</span>
        </button>
        <button class="sidebar-item" onclick="switchTab('risks')">
          <span class="item-icon">🚨</span>
          <span class="item-label">Risks & Actions</span>
        </button>
        <button class="sidebar-item" onclick="switchTab('admin_facilities')">
          <span class="item-icon">🏢</span>
          <span class="item-label">Admin & Facilities</span>
        </button>
      </div>
      <div class="sidebar-group" id="adminSection" style="display:none">
        <div class="sidebar-group-label">Admin</div>
        <button class="sidebar-item" onclick="switchTab('settings')">
          <span class="item-icon">⚙️</span>
          <span class="item-label">Settings</span>
        </button>
        <button class="sidebar-item" onclick="switchTab('upload_data')">
          <span class="item-icon">📤</span>
          <span class="item-label">Upload Data</span>
        </button>
      </div>
    </div>
  </div>

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="label">CMS IT SERVICES · PEOPLE & ORGANISATION</div>
      <h1>HR <span>OPS</span> COMMAND CENTRE ⚡</h1>
    </div>
    <div class="header-right">
      <div class="live-badge">
        <span class="dot"></span>
        <span>WEEK: <span id="currentWeekLabel">—</span></span>
      </div>
      <div style="display:flex;gap:12px;align-items:center">
        <span style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace"><span id="userName">User</span> | <span id="userRole">—</span></span>
        <button onclick="sbLogout()" style="background:none;border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:11px;color:var(--muted);cursor:pointer">Sign out</button>
      </div>
    </div>
  </div>

  <!-- WEEK BAR -->
  <div class="week-bar">
    <div class="week-bar-left" id="weekButtons"></div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <div class="tab-content" id="mainContent"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
// SUPABASE INIT

// AUTHENTICATION
// ═══════════════════════════════════════════════════════════════════
async function sbLogin() {
  const email = document.getElementById('sbEmail').value.trim();
  const pwd = document.getElementById('sbPwd').value;
  const errDiv = document.getElementById('sbErr');
  const btn = document.getElementById('sbLoginBtn');

  if (!email || !pwd) {
    errDiv.style.display = 'block';
    errDiv.style.background = 'var(--red-glow)';
    errDiv.style.color = 'var(--red)';
    errDiv.textContent = '⚠️ Please enter both email and password';
    return;
  }

  btn.textContent = 'SIGNING IN...';
  btn.disabled = true;

  try {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password: pwd });
    if (error) throw error;

    userData = data.user;
    console.log('Logged in:', userData.email);
    
    // Fetch user role
    const { data: roleData, error: roleError } = await supabase
      .from('user_roles')
      .select('role, region')
      .eq('email', userData.email)
      .single();

    if (roleError) {
      console.warn('No role found, defaulting to HRBP');
      userRole = 'hrbp';
      userRegion = null;
    } else {
      userRole = roleData.role;
      userRegion = roleData.region;
    }

    document.getElementById('sbLoginScreen').style.display = 'none';
    document.getElementById('appContainer').style.display = 'block';
    document.getElementById('userName').textContent = userData.email.split('@')[0];
    document.getElementById('userRole').textContent = userRole.toUpperCase();

    // Show admin section if admin/cxo
    if (userRole === 'admin' || userRole === 'cxo') {
      document.getElementById('adminSection').style.display = 'block';
    }

    await init();
  } catch (err) {
    console.error('Login error:', err);
    errDiv.style.display = 'block';
    errDiv.style.background = 'var(--red-glow)';
    errDiv.style.color = 'var(--red)';
    errDiv.textContent = '⚠️ ' + (err.message || 'Invalid credentials');
    btn.textContent = 'SIGN IN';
    btn.disabled = false;
  }
}

async function sbLogout() {
  await supabase.auth.signOut();
  location.reload();
}

// CONFIGURATION MANAGER
// ═══════════════════════════════════════════════════════════════════
class ConfigManager {
  constructor() {
    this.config = {
      hrbp_targets: {},
      recruiter_targets: {},
      regional_quotas: {},
      alert_thresholds: {}
    };
    this.loaded = false;
  }

  async loadConfig() {
    try {
      const { data, error } = await supabase
        .from('dashboard_config')
        .select('*');

      if (error) throw error;

      data.forEach(row => {
        this.config[row.config_key] = row.config_value;
      });

      this.loaded = true;
      console.log('Configuration loaded:', this.config);
    } catch (err) {
      console.error('Error loading config:', err);
      this.loadDefaults();
    }
  }

  loadDefaults() {
    this.config = {
      hrbp_targets: {
        geo_punch_target: 95,
        geo_punch_weight: 40,
        geo_punch_red_flag: 80,
        wfh_od_target: 5,
        wfh_od_weight: 30,
        wfh_od_penalty_per_pct: 5,
        site_visits_target: 8,
        site_visits_weight: 10,
        rr_event_bonus: 5,
        townhall_bonus: 5,
        site_visits_max_bonus: 10,
        initiatives_target: 2,
        initiatives_weight: 10,
        bonus_zero_absenteeism: 5,
        bonus_fnf_100pct: 3,
        penalty_absenteeism: -5
      },
      recruiter_targets: {
        hiring_volume: { senior: 8, regular: 5, junior: 3, weight: 25 },
        time_to_fill: { ideal: 30, threshold: 45, weight: 25, penalty_per_day: 0.5 },
        offer_acceptance: { target: 75, weight: 20 },
        source_weights: { Referral: 5, Naukri: 3, LinkedIn: 2, Consultancy: 1, 'Walk-in': 0.5 },
        source_effectiveness_weight: 15,
        pipeline_ratio: { ideal: 3, weight: 15 },
        bonus_critical_role: 5,
        bonus_platinum_hire: 3,
        penalty_aging_req: -3,
        penalty_dropout: -2
      },
      regional_quotas: {
        North: { headcount: 720, hire_target: 18, attrition_target: 2.5 },
        South: { headcount: 890, hire_target: 22, attrition_target: 3.0 },
        East: { headcount: 485, hire_target: 12, attrition_target: 2.0 },
        West: { headcount: 752, hire_target: 19, attrition_target: 2.8 }
      },
      alert_thresholds: {
        critical: {
          geo_punch_below: 80,
          wfh_od_above: 10,
          long_term_wfh_days: 90,
          req_aging_days: 60,
          recruiter_score_below: 60,
          hrbp_score_below: 70,
          attrition_above: 4
        },
        high_priority: {
          geo_punch_below: 90,
          wfh_od_above: 7,
          req_aging_days: 45,
          recruiter_score_below: 75,
          hrbp_score_below: 80,
          attrition_above: 3
        }
      }
    };
    this.loaded = true;
  }

  get(path) {
    const keys = path.split('.');
    let value = this.config;
    for (const key of keys) {
      value = value[key];
      if (value === undefined) return null;
    }
    return value;
  }

  async saveConfig(configKey, newValue) {
    try {
      const { error } = await supabase
        .from('dashboard_config')
        .upsert({
          config_key: configKey,
          config_value: newValue,
          updated_by: userData.email,
          updated_at: new Date().toISOString()
        }, { onConflict: 'config_key' });

      if (error) throw error;

      this.config[configKey] = newValue;
      return { success: true };
    } catch (err) {
      console.error('Error saving config:', err);
      return { success: false, error: err.message };
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
// INIT & DATA LOADING
// ═══════════════════════════════════════════════════════════════════
async function init() {
  console.log('Initializing dashboard...');
  
  // Initialize config manager
  configManager = new ConfigManager();
  await configManager.loadConfig();

  // Load weekly reports from Supabase
  try {
    const { data, error } = await supabase
      .from('weekly_reports')
      .select('*')
      .order('week_id', { ascending: true });

    if (error) throw error;

    console.log('Loaded weekly reports:', data.length);

    // Parse data
    data.forEach(row => {
      WEEKS_DATA[row.week_id] = {
        week_id: row.week_id,
        week_label: row.week_label,
        week_start: row.week_start,
        week_end: row.week_end,
        data: row.data || {}
      };
    });

    WEEK_ORDER = Object.keys(WEEKS_DATA).sort();
    currentWeek = WEEK_ORDER[WEEK_ORDER.length - 1] || '';

    console.log('Weeks available:', WEEK_ORDER);
    console.log('Current week:', currentWeek);

    renderWeekButtons();
    switchTab('overview');
  } catch (err) {
    console.error('Error loading data:', err);
    document.getElementById('mainContent').innerHTML = `
      <div class="empty-state">
        <h2 style="color:var(--red);margin-bottom:16px">⚠️ Error Loading Data</h2>
        <p>${err.message}</p>
        <p style="margin-top:12px;font-size:12px;color:var(--muted)">Please contact your administrator.</p>
      </div>
    `;
  }
}

function renderWeekButtons() {
  const container = document.getElementById('weekButtons');
  container.innerHTML = WEEK_ORDER.slice(-6).map((wid, idx) => {
    const w = WEEKS_DATA[wid];
    const isLatest = idx === WEEK_ORDER.slice(-6).length - 1;
    const cls = wid === currentWeek ? 'week-btn active' : 'week-btn';
    return `<button class="${cls}${isLatest ? ' latest' : ''}" onclick="setWeek('${wid}')">${w.week_label}</button>`;
  }).join('');

  document.getElementById('currentWeekLabel').textContent = WEEKS_DATA[currentWeek]?.week_label || '—';
}

function setWeek(wid) {
  currentWeek = wid;
  renderWeekButtons();
  switchTab(currentTab);
}

function switchTab(tab) {
  currentTab = tab;
  
  // Update sidebar active state
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.remove('active');
  });
  const activeBtn = Array.from(document.querySelectorAll('.sidebar-item'))
    .find(el => el.onclick && el.onclick.toString().includes(`'${tab}'`));
  if (activeBtn) activeBtn.classList.add('active');

  // Render tab content
  const content = document.getElementById('mainContent');
  
  if (!WEEKS_DATA[currentWeek]) {
    content.innerHTML = '<div class="empty-state">No data available for this week.</div>';
    return;
  }

  switch (tab) {
    case 'overview':
      content.innerHTML = renderOverview();
      break;
    case 'ta_pipeline':
      content.innerHTML = renderTAPipeline();
      break;
    case 'ta_commitments':
      content.innerHTML = renderTACommitments();
      break;
    case 'resignations':
      content.innerHTML = renderResignations();
      break;
    case 'hrbp_connects':
      content.innerHTML = renderHRBPConnects();
      break;
    case 'long_absenteeism':
      content.innerHTML = renderLongAbsenteeism();
      break;
    case 'od_wfh':
      content.innerHTML = renderODWFH();
      break;
    case 'hr_ops':
      content.innerHTML = renderHROps();
      break;
    case 'fnf':
      content.innerHTML = renderFnF();
      break;
    case 'lnd':
      content.innerHTML = renderLnD();
      break;
    case 'workforce_intel':
      content.innerHTML = renderWorkforceIntel();
      break;
    case 'risks':
      content.innerHTML = renderRisks();
      break;
    case 'admin_facilities':
      content.innerHTML = renderAdminFacilities();
      break;
    case 'settings':
      content.innerHTML = renderSettings();
      break;
    case 'upload_data':
      content.innerHTML = renderUploadData();
      break;
    default:
      content.innerHTML = '<div class="empty-state">Tab under construction</div>';
  }
}

async function saveSettings() {
  const hrbpTargets = {
    geo_punch_target: parseFloat(document.getElementById('cfg_geo_punch_target').value),
    wfh_od_target: parseFloat(document.getElementById('cfg_wfh_od_target').value),

    initiatives_target: parseFloat(document.getElementById('cfg_initiatives_target').value),
    ...configManager.config.hrbp_targets
  };

  const recruiterTargets = {
    ...configManager.config.recruiter_targets,

      ...configManager.config.recruiter_targets.hiring_volume,
      senior: parseFloat(document.getElementById('cfg_hiring_senior').value),

function toggleTheme() {
  document.body.classList.toggle('light-mode');
  const icon = document.getElementById('themeIcon');
  icon.textContent = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
  localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
}

// Load saved theme
const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'light') {
  document.body.classList.add('light-mode');
  if (document.getElementById('themeIcon')) {
    document.getElementById('themeIcon').textContent = '☀️';
  }
}

window.addEventListener('DOMContentLoaded', async () => {

      .from('user_roles')
      .select('role, region')
      .eq('email', userData.email)
      .single();

    if (roleData) {
      userRole = roleData.role;
      userRegion = roleData.region;
    } else {
      userRole = 'hrbp';
      userRegion = null;
    }

    document.getElementById('sbLoginScreen').style.display = 'none';
    document.getElementById('appContainer').style.display = 'block';
    document.getElementById('userName').textContent = userData.email.split('@')[0];
    document.getElementById('userRole').textContent = userRole.toUpperCase();

    if (userRole === 'admin' || userRole === 'cxo') {
      document.getElementById('adminSection').style.display = 'block';
    }

    await init();
  }
});
</script>
</body>
</html>
