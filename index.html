<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMS IT · HR Dashboard</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--muted2:#6e7681;--accent:#3b82f6;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#a78bfa;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:40px;width:100%;max-width:380px}
.auth-logo{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.auth-title{font-size:22px;font-weight:600;margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;transition:border .15s}
.field input:focus{border-color:var(--accent)}
.btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:600;cursor:pointer}
.btn:hover{opacity:.88}.btn:disabled{opacity:.5;cursor:not-allowed}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;font-size:12px;padding:10px 14px;border-radius:8px;margin-top:12px}
.app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.topbar-brand{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent)}
.topbar-week{font-size:11px;color:var(--muted);background:var(--bg3);padding:4px 10px;border-radius:20px;border:1px solid var(--border)}
.role-badge{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 10px;border-radius:20px}
.role-admin{background:rgba(167,139,250,.15);color:var(--purple)}
.role-executive{background:rgba(59,130,246,.15);color:var(--accent)}
.role-hrbp{background:rgba(34,197,94,.15);color:var(--green)}
.so-btn{font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);padding:5px 12px;border-radius:6px;cursor:pointer}
.so-btn:hover{border-color:var(--muted);color:var(--text)}
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:12px 16px;font-size:12px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.tab:hover{color:var(--text)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.main{padding:24px;max-width:1400px;margin:0 auto;width:100%}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.ct{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px}
.kv{font-size:30px;font-weight:700;line-height:1;margin-bottom:4px}
.kl{font-size:11px;color:var(--muted);letter-spacing:.5px}
.ks{font-size:11px;color:var(--muted2);margin-top:4px}
.wpills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.wp{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border);cursor:pointer;color:var(--muted);background:none}
.wp:hover{border-color:var(--accent);color:var(--accent)}.wp.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tag{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}
.tn{background:rgba(59,130,246,.15);color:#60a5fa}.ts{background:rgba(34,197,94,.15);color:#4ade80}
.te{background:rgba(251,191,36,.15);color:#fbbf24}.tw{background:rgba(167,139,250,.15);color:#a78bfa}.tp{background:rgba(148,163,184,.15);color:#94a3b8}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-family:monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);padding:0 10px 10px;border-bottom:1px solid var(--border);text-align:left}
.tbl th:not(:first-child){text-align:right}
.tbl td{padding:9px 10px;border-bottom:1px solid rgba(48,54,61,.5)}
.tbl td:not(:first-child){text-align:right;font-family:monospace;font-size:11px;color:var(--muted)}
.tbl tr:last-child td{border-bottom:none}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.srow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(48,54,61,.4);font-size:12px}
.srow:last-child{border-bottom:none}
.pbw{background:var(--bg3);border-radius:3px;height:4px;flex:1;margin:0 10px;overflow:hidden}
.pbf{height:100%;border-radius:3px}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.loader{display:flex;align-items:center;justify-content:center;padding:60px;gap:10px;color:var(--muted);font-size:13px}
.spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.notice{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);color:#93c5fd;font-size:12px;padding:10px 14px;border-radius:8px;margin-bottom:16px;line-height:1.5}
.urow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(48,54,61,.4);font-size:13px}
.urow:last-child{border-bottom:none}
.ssel{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font-size:11px}
.wb-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.wb-lbl{font-size:11px;color:var(--muted);min-width:90px}
.wb-track{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.wb-fill{height:100%;border-radius:3px;transition:width .8s ease}
.wb-num{font-family:monospace;font-size:10px;color:var(--muted);min-width:40px;text-align:right}
.stitle{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:16px}
.cc{padding:10px 0;border-bottom:1px solid rgba(48,54,61,.4)}.cc:last-child{border-bottom:none}
.uz{border:2px dashed var(--border);border-radius:10px;padding:40px;text-align:center;cursor:pointer}
.uz:hover,.uz.drag{border-color:var(--accent);background:rgba(59,130,246,.04)}
@media(max-width:768px){.g4,.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}.main{padding:16px}.topbar{padding:0 14px}}
@media(max-width:480px){.g4,.g3{grid-template-columns:1fr}}
</style>
</head>

const sb=supabase.createClient(SB_URL,SB_KEY);
let ME=null,ROLE=null,CUR_WEEK=null,WEEKS={},CUR_TAB='overview';

async function doLogin(){
  const email=document.getElementById('lEmail').value.trim();
  const pwd=document.getElementById('lPwd').value;
  const btn=document.getElementById('lBtn');
  const err=document.getElementById('lErr');
  err.innerHTML='';btn.disabled=true;btn.textContent='Signing in…';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pwd});
  btn.disabled=false;btn.textContent='Sign In';
  if(error){err.innerHTML=`<div class="err">${error.message}</div>`;return;}
  await bootApp(data.user);
}
async function doSignOut(){
  await sb.auth.signOut();
  document.getElementById('appWrap').style.display='none';
  document.getElementById('authWrap').style.display='flex';
  ME=null;ROLE=null;WEEKS={};
}
async function bootApp(user){
  ME=user;
  document.getElementById('authWrap').style.display='none';
  document.getElementById('appWrap').style.display='flex';
  await loadRole();await loadWeeks();buildTabs();showTab('overview');
}
async function loadRole(){
  const {data}=await sb.from('user_profiles').select('role,region').eq('id',ME.id).single();
  ROLE=data||{role:'viewer',region:null};
  const b=document.getElementById('roleBadge');
  b.textContent=ROLE.role;
  b.className='role-badge role-'+(ROLE.role==='admin'?'admin':ROLE.role==='executive'?'executive':'hrbp');
}
async function loadWeeks(){
  const {data,error}=await sb.from('weekly_reports').select('*').order('week_num',{ascending:false}).limit(20);
  if(!error&&data&&data.length){
    data.forEach(r=>WEEKS[r.week_key]=r);
    CUR_WEEK=data[0].week_key;
    document.getElementById('topWeek').textContent='W'+data[0].week_num+' · '+data[0].label;
  }else{document.getElementById('topWeek').textContent='No data yet';}
}
function getTabs(){
  const t=[{id:'overview',l:'Overview'},{id:'ta',l:'Talent Acquisition'},{id:'hrbp',l:'HRBP & Engagement'},{id:'ops',l:'HR Ops & Payroll'},{id:'ld',l:'L&D'}];
  if(ROLE.role==='admin'||ROLE.role==='executive')t.push({id:'workforce',l:'Workforce Intel'});
  if(ROLE.role==='admin')t.push({id:'upload',l:'Upload Data'},{id:'users',l:'Users'});
  return t;
}
function buildTabs(){
  document.getElementById('tabBar').innerHTML=getTabs().map(t=>`<button class="tab${t.id===CUR_TAB?' active':''}" onclick="showTab('${t.id}')">${t.l}</button>`).join('');
}
function showTab(id){
  CUR_TAB=id;buildTabs();
  const mc=document.getElementById('mainArea');
  const w=CUR_WEEK?WEEKS[CUR_WEEK]:null;
  const wk=Object.keys(WEEKS).sort((a,b)=>(WEEKS[b].week_num||0)-(WEEKS[a].week_num||0));
  const pw=wk[1]?WEEKS[wk[1]]:null;
  if(id==='overview')mc.innerHTML=renderOverview(w,pw,wk);
  else if(id==='ta')mc.innerHTML=renderTA(w,pw);
  else if(id==='hrbp')mc.innerHTML=renderHRBP(w);
  else if(id==='ops')mc.innerHTML=renderOps(w);
  else if(id==='ld')mc.innerHTML=renderLD(w);
  else if(id==='workforce')mc.innerHTML=renderWorkforce();
  else if(id==='upload')mc.innerHTML=renderUpload();
  else if(id==='users')loadUsers(mc);
}
function switchWeek(k){
  CUR_WEEK=k;document.getElementById('topWeek').textContent='W'+WEEKS[k].week_num+' · '+WEEKS[k].label;showTab(CUR_TAB);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function noData(){return'<div class="empty"><div style="font-size:32px;margin-bottom:12px">📭</div><div style="font-size:15px;font-weight:500;margin-bottom:8px">No data yet</div><div>Go to Upload Data to add your first report</div></div>';}
function pills(wk){return`<div class="wpills">${wk.map(k=>`<button class="wp${k===CUR_WEEK?' active':''}" onclick="switchWeek('${k}')">W${WEEKS[k].week_num} · ${WEEKS[k].label}</button>`).join('')}</div>`;}
function kpi(label,val,prev,color,inv){
  const diff=prev!=null?(val||0)-(prev||0):null;
  const dc=diff==null?'':diff===0?'var(--muted)':diff>0?(inv?'var(--red)':'var(--green)'):(inv?'var(--green)':'var(--red)');
  return`<div class="kpi"><div class="kv" style="color:${color}">${val??'—'}</div><div class="kl">${label}</div>${diff!=null?`<div class="ks" style="color:${dc}">${diff>=0?'+':''}${diff} vs last wk</div>`:''}</div>`;
}
function rtag(r){const cls={North:'tn',South:'ts',East:'te',West:'tw'}[r]||'tp';return`<span class="tag ${cls}">${r||'—'}</span>`;}
function getRegion(name){
  const n=(name||'').toLowerCase();
  if(n.includes('abhishek')||n.includes('rekha')||n.includes('salma'))return'North';
  if(n.includes('priya')||n.includes('suhail')||n.includes('mousumi')||n.includes('caral'))return'South';
  if(n.includes('pijush')||n.includes('surajit'))return'East';
  if(n.includes('somasri')||n.includes('ayush')||n.includes('shambhavi')||n.includes('kumari')||n.includes('nilam')||n.includes('nikita')||n.includes('juee'))return'West';
  return'Pan-India';
}
function rlist(arr,label,color){
  const items=(arr||[]).filter(i=>i&&i.length>5);
  if(!items.length)return'';
  return`<div style="margin-top:10px"><div style="font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:${color};margin-bottom:6px">${label}</div>${items.map(i=>`<div style="padding:5px 0;border-bottom:1px solid rgba(48,54,61,.3);font-size:12px;color:var(--muted)">${esc(i.substring(0,220))}</div>`).join('')}</div>`;
}

function taByRegion(det){
  const r={North:0,South:0,East:0,West:0,'Pan-India':0};
  det.forEach(d=>{if(r[d.region]!=null)r[d.region]+=(d.closed||0);});
  const mx=Math.max(...Object.values(r),1);
  const cls={North:'tn',South:'ts',East:'te',West:'tw','Pan-India':'tp'};
  return Object.entries(r).map(([reg,v])=>`<div class="srow"><span class="tag ${cls[reg]}">${reg}</span><div class="pbw"><div class="pbf" style="width:${(v/mx*100).toFixed(0)}%;background:var(--accent)"></div></div><span style="font-family:monospace;font-size:11px;color:var(--muted)">${v} closed</span></div>`).join('');
}
function weekFlags(w){
  const items=[];
  if((w.ta_dropouts||0)>2)items.push({c:'var(--amber)',t:`${w.ta_dropouts} offer dropouts`});
  if((w.payroll_errors||0)>5)items.push({c:'var(--red)',t:`${w.payroll_errors} payroll errors`});
  if((w.hrops_esc||0)>100)items.push({c:'var(--amber)',t:`${w.hrops_esc} escalations handled`});
  (w.hrbp_risks||[]).filter(r=>r&&r.length>10).slice(0,2).forEach(r=>items.push({c:'var(--red)',t:r.substring(0,90)}));
  (w.ta_constraints||[]).filter(c=>c&&c.length>10&&c!=='NA').slice(0,2).forEach(c=>items.push({c:'var(--muted2)',t:c.substring(0,90)}));
  if(!items.length)return'<div class="empty">No critical flags this week</div>';
  return items.map(i=>`<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(48,54,61,.4);font-size:12px;color:var(--muted)"><span style="color:${i.c};flex-shrink:0">●</span><span>${esc(i.t)}</span></div>`).join('');
}

function ccCard(c){
  const region=getRegion(c.name||'');
  const detail=c.detail||'';
  const client=detail.split('\n')[0].split(/\s*[-–]\s*/)[0].trim().substring(0,50);
  const acctM=detail.match(/\b(Platinum|Gold|Silver)\s+Account/i);
  const acct=acctM?acctM[1]:'';
  const bc=acct==='Platinum'?'var(--purple)':acct==='Gold'?'var(--amber)':'transparent';
  const badge=acct?`<span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;background:rgba(148,163,184,.1);color:${bc};margin-left:4px">${acct}</span>`:'';
  const bs=acct?`border-left:3px solid ${bc};padding-left:10px;margin-left:-10px;`:'';
  const enc=btoa(encodeURIComponent(detail));
  return`<div class="cc" style="${bs}">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px"><span style="font-size:12px;font-weight:500">${esc(c.name||'')}</span>${rtag(region)}${badge}</div>
    <div style="font-size:12px;color:var(--accent);margin-bottom:3px">${esc(client)}</div>
    <div style="font-size:11px;color:var(--muted2);line-height:1.5">${esc(detail.replace(/\n/g,' ').substring(0,110))}${detail.length>110?'…':''}</div>
    ${detail.length>110?`<div style="font-size:10px;color:var(--accent);cursor:pointer;margin-top:4px" onclick="expandCC(this,'${enc}')">▼ View full details</div>`:''}
  </div>`;
}
function expandCC(el,enc){
  const t=decodeURIComponent(atob(enc));
  el.previousElementSibling.style.display='none';
  const d=document.createElement('div');
  d.style.cssText='font-size:11px;color:var(--muted2);line-height:1.6;white-space:pre-wrap;padding-top:4px';
  d.textContent=t;el.parentElement.insertBefore(d,el);el.remove();
}

/* WORKFORCE */
function renderWorkforce(){
  const W=WI,F=W.fnf;
  function pb(pct,col){return`<div class="wb-track"><div class="wb-fill" style="width:${Math.min(pct,100)}%;background:${col}"></div></div>`;}
  const q1x=['Jan','Feb','Mar'].reduce((a,m)=>a+(W.attrition[m]?.exits||0),0);
  const q1a=['Jan','Feb','Mar'].reduce((a,m)=>a+(W.attrition[m]?.active_hc||0),0)/3;
  const ann=q1a>0?(q1x/q1a*12*100).toFixed(1):'—';
  const tj=Object.values(W.ta_monthly).reduce((a,b)=>a+b.joined,0);
  const plat=W.accounts.filter(a=>a.tier==='Platinum'&&a.hc>0);
  const gld=W.accounts.filter(a=>a.tier==='Gold'&&a.hc>0);
  const tBands=['<3 months','3m-1yr','1-2 yrs','2-5 yrs','>5 yrs'];
  const tCols={'<3 months':'#f87171','3m-1yr':'#fb923c','1-2 yrs':'#fbbf24','2-5 yrs':'#60a5fa','>5 yrs':'#a78bfa'};
  const tTot=tBands.reduce((a,b)=>a+(W.attrition_by_tenure[b]?.jan_mar||0),0);
  const tMax=Math.max(...tBands.map(b=>W.attrition_by_tenure[b]?.jan_mar||0),1);
  const attrMs=['Jan','Feb','Mar','Apr','May'];
  const maxEx=Math.max(...attrMs.map(m=>W.attrition[m]?.exits||0),1);
  function acctTbl(accts,label,col){
    const tot=accts.reduce((s,a)=>({hc:s.hc+a.hc,w:s.w+a.wage_cr,f:s.f+a.female,j:s.j+a.ta_joined,e:s.e+a.exits_2026}),{hc:0,w:0,f:0,j:0,e:0});
    const ta=tot.hc>0?((tot.e/tot.hc)*12/5*100).toFixed(1):0;
    return`<div style="font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:${col};margin-bottom:8px">${label}</div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Account</th><th>HC</th><th>Wage Bill</th><th>Female</th><th>TA Joined</th><th>Exits</th><th>Attr%</th></tr></thead><tbody>
      ${accts.map(a=>{const fc=a.female_pct>10?'var(--green)':a.female_pct>5?'var(--amber)':'var(--red)';const ec=a.exits_2026>3?'var(--red)':a.exits_2026>0?'var(--amber)':'var(--muted)';const ar=a.attrition_rate_ann||0;const ac=ar>20?'var(--red)':ar>10?'var(--amber)':ar>0?'var(--text)':'var(--muted)';return`<tr><td>${esc(a.name)}</td><td>${a.hc}</td><td style="color:var(--accent)">₹${a.wage_cr}Cr</td><td style="color:${fc}">${a.female}(${a.female_pct}%)</td><td style="color:var(--green)">${a.ta_joined}</td><td style="color:${ec}">${a.exits_2026}</td><td style="color:${ac}">${ar>0?ar+'%':'—'}</td></tr>`;}).join('')}
      <tr style="border-top:1px solid var(--border)"><td>Total</td><td>${tot.hc}</td><td style="color:var(--accent)">₹${tot.w.toFixed(2)}Cr</td><td>${tot.f}(${tot.hc>0?(tot.f/tot.hc*100).toFixed(1):0}%)</td><td style="color:var(--green)">${tot.j}</td><td>${tot.e}</td><td style="color:var(--muted)">${ta}%</td></tr>
    </tbody></table></div><br>`;
  }
  return`<div class="stitle">Workforce Overview — Mar 2026</div>
  <div class="g4">
    <div class="kpi"><div class="kv">${W.active_hc_mar.toLocaleString()}</div><div class="kl">Active HC</div><div class="ks">March 2026</div></div>
    <div class="kpi"><div class="kv" style="color:var(--accent)">₹${W.total_wage_bill_cr}Cr</div><div class="kl">Annual Wage Bill</div><div class="ks">Jan 2026 snapshot</div></div>
    <div class="kpi"><div class="kv" style="color:var(--red)">${ann}%</div><div class="kl">Annualised Attrition</div><div class="ks">Q1 2026 · ${q1x} exits</div></div>
    <div class="kpi"><div class="kv" style="color:var(--green)">${tj}</div><div class="kl">New Hires Jan–Mar</div><div class="ks">Female: ${W.female_count} (${W.female_pct}%)</div></div>
  </div>
  <div class="g2">
    <div class="card"><div class="ct">Attrition by Month 2026</div>
      <div style="display:flex;align-items:flex-end;gap:8px;height:80px;margin:12px 0 6px">
        ${attrMs.map(m=>{const d=W.attrition[m]||{exits:0,rate:0};const bh=Math.max((d.exits/maxEx)*70,2);const fut=m==='Apr'||m==='May';return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px"><span style="font-family:monospace;font-size:10px;color:${fut?'var(--muted)':'var(--text)'}">${d.exits}</span><div style="width:100%;height:${bh}px;background:${fut?'rgba(148,163,184,.15)':m==='Mar'?'var(--amber)':'var(--accent)'};border-radius:2px 2px 0 0;align-self:flex-end"></div><span style="font-size:9px;color:var(--muted)">${m}</span></div>`;}).join('')}
      </div>
      <div style="font-size:10px;color:var(--muted2)">Apr–May = notice periods pre-entered</div>
    </div>
    <div class="card"><div class="ct">Exits by Tenure Band (Jan–Mar)</div>
      ${tBands.map(b=>{const cnt=W.attrition_by_tenure[b]?.jan_mar||0;const sp=tTot>0?Math.round(cnt/tTot*100):0;return`<div class="wb-row"><span class="wb-lbl">${b}</span>${pb(Math.round(cnt/tMax*100),tCols[b])}<span class="wb-num">${cnt} <span style="color:var(--muted2);font-size:9px">(${sp}%)</span></span></div>`;}).join('')}
      <div style="font-size:10px;color:var(--amber);margin-top:8px">⚠ 2–5yr band highest</div>
    </div>
  </div>
  <div class="stitle">Platinum &amp; Gold Accounts</div>
  ${acctTbl(plat,'Platinum','var(--purple)')}
  ${acctTbl(gld,'Gold','var(--amber)')}`;
}

function doDrop(e){e.preventDefault();document.querySelector('.uz').classList.remove('drag');if(e.dataTransfer.files[0])doFile(e.dataTransfer.files[0]);}
async function doFile(file){
  if(!file)return;
  const st=document.getElementById('upSt');
  st.innerHTML='<div class="loader"><div class="spin"></div>Uploading…</div>';
  const path=`weekly/${Date.now()}_${file.name}`;
  const {error}=await sb.storage.from('hr-reports').upload(path,file);
  if(error){st.innerHTML=`<div style="color:var(--red);font-size:13px">Failed: ${error.message}</div>`;return;}
  st.innerHTML=`<div style="color:var(--green);font-size:13px;padding:10px 0;line-height:1.6">✓ Uploaded: <code style="background:var(--bg3);padding:2px 6px;border-radius:4px;font-size:11px">${path}</code><br><span style="color:var(--muted);font-size:12px">Run the Python parser to push data to dashboard.</span></div>`;
}
async function delWeek(k){
  if(!confirm('Delete week '+k+'?'))return;
  const {error}=await sb.from('weekly_reports').delete().eq('week_key',k);
  if(!error){delete WEEKS[k];if(CUR_WEEK===k)CUR_WEEK=Object.keys(WEEKS)[0]||null;showTab('upload');}
}

/* USERS */
async function loadUsers(mc){
  if(ROLE.role!=='admin'){mc.innerHTML='<div class="empty">Admin access required</div>';return;}
  mc.innerHTML='<div class="loader"><div class="spin"></div>Loading…</div>';
  const {data}=await sb.from('user_profiles').select('id,email,role,region,created_at').order('created_at');
  const users=data||[];
  mc.innerHTML=`<div class="card" style="max-width:660px"><div class="ct">Add New User</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      <div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">Email</label><input type="email" id="iEm" placeholder="user@cmsit.com" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-size:13px;outline:none"></div>
      <div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">Password</label><input type="password" id="iPw" placeholder="••••••••" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-size:13px;outline:none"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end">
      <div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">Role</label>
        <select id="iRo" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:13px">
          <option value="executive">Executive</option><option value="hrbp">HRBP</option><option value="admin">Admin</option>
        </select></div>
      <div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">Region</label>
        <select id="iRg" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:13px">
          <option value="">All</option><option>North</option><option>South</option><option>East</option><option>West</option>
        </select></div>
      <button onclick="addUser()" style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;height:36px">Add</button>
    </div>
    <div id="uSt" style="margin-top:10px"></div></div>
  <div class="card" style="max-width:660px;margin-top:0"><div class="ct">All Users (${users.length})</div>
    ${users.map(u=>`<div class="urow"><div><div style="font-size:13px;font-weight:500">${esc(u.email||'—')}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${u.region||'All regions'} · ${u.created_at?.substring(0,10)||'—'}</div></div>
      <div style="display:flex;align-items:center;gap:10px">
        <select class="ssel" onchange="updRole('${u.id}',this.value)">${['admin','executive','hrbp','viewer'].map(r=>`<option ${u.role===r?'selected':''}>${r}</option>`).join('')}</select>
        ${u.id!==ME.id?`<button onclick="rmUser('${u.id}')" style="font-size:11px;color:var(--red);background:none;border:1px solid rgba(239,68,68,.3);padding:3px 10px;border-radius:6px;cursor:pointer">Remove</button>`:'<span style="font-size:11px;color:var(--muted2)">You</span>'}
      </div></div>`).join('')}
  </div>`;
}
async function addUser(){
  const em=document.getElementById('iEm').value.trim(),pw=document.getElementById('iPw').value;
  const ro=document.getElementById('iRo').value,rg=document.getElementById('iRg').value;
  const st=document.getElementById('uSt');
  if(!em||!pw){st.innerHTML='<div style="color:var(--red);font-size:13px">Email and password required</div>';return;}
  st.innerHTML='<div class="loader"><div class="spin"></div>Creating…</div>';
  const {data,error}=await sb.auth.admin.createUser({email:em,password:pw,email_confirm:true});
  if(error){st.innerHTML=`<div style="color:var(--red);font-size:13px">${error.message}</div>`;return;}
  await sb.from('user_profiles').upsert({id:data.user.id,email:em,role:ro,region:rg||null});
  st.innerHTML=`<div style="color:var(--green);font-size:13px">✓ ${em} added as ${ro}</div>`;
  document.getElementById('iEm').value='';document.getElementById('iPw').value='';
  await loadUsers(document.getElementById('mainArea'));
}
async function updRole(uid,role){await sb.from('user_profiles').update({role}).eq('id',uid);}
async function rmUser(uid){
  if(!confirm('Remove?'))return;
  await sb.auth.admin.deleteUser(uid);
  await sb.from('user_profiles').delete().eq('id',uid);
  await loadUsers(document.getElementById('mainArea'));
}

/* INIT */
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(session?.user)await bootApp(session.user);
  document.getElementById('lEmail').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('lPwd').focus();});
  document.getElementById('lPwd').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
})();
</script>
</body>
