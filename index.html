<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR CXO Dashboard — CMS IT Services</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#0f1923;--surface:#172130;--surface2:#1c2a3a;--surface3:#223244;--border:#2a3d52;--border2:#344d66;--accent:#60a5fa;--accent-glow:rgba(96,165,250,.12);--green:#34d399;--green-glow:rgba(52,211,153,.1);--amber:#fbbf24;--amber-glow:rgba(251,191,36,.1);--red:#f87171;--red-glow:rgba(248,113,113,.1);--purple:#c084fc;--text:#e2e8f0;--muted:#8aa0bc;--muted2:#546e8a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,158,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(59,158,255,.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

/* HEADER */
.header{position:relative;z-index:10;padding:22px 36px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;background:linear-gradient(180deg,rgba(59,158,255,.05) 0%,transparent 100%)}
.header-left .label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
.header-left h1{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px;line-height:1}
.header-left h1 span{color:var(--accent)}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.live-badge{display:inline-flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:7px 14px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

/* WEEK SELECTOR BAR */
.week-bar{position:relative;z-index:10;background:var(--surface);border-bottom:1px solid var(--border);padding:0 36px;display:flex;align-items:center;gap:0;justify-content:space-between}
.week-bar-left{display:flex;gap:0}
.week-btn{padding:13px 20px;font-family:'DM Mono',monospace;font-size:11px;border:none;border-bottom:2px solid transparent;background:none;color:var(--muted);cursor:pointer;transition:all .2s;letter-spacing:.5px;white-space:nowrap}
.week-btn:hover{color:var(--text)}
.week-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.week-btn.latest::after{content:'LATEST';font-size:8px;vertical-align:super;margin-left:4px;color:var(--green);letter-spacing:1px}
.wow-indicator{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);padding:0 8px;display:flex;align-items:center;gap:6px}
.wow-indicator span{padding:3px 8px;border-radius:4px;font-size:9px}

/* NAV TABS */
.nav-tabs{position:relative;z-index:10;display:flex;padding:0 36px;border-bottom:1px solid var(--border);background:var(--surface2)}
.tab-btn{padding:12px 18px;font-size:12px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* MAIN */
.main{position:relative;z-index:5;padding:28px 36px;max-width:1600px;margin:0 auto}

/* SECTION LABEL */
.section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);margin-bottom:14px;margin-top:32px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.section-label:first-child{margin-top:0}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.kpi-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:18px 18px 14px;position:relative;overflow:hidden;transition:border-color .2s}
.kpi-card:hover{border-color:var(--border2)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:10px 10px 0 0}
.kpi-card.blue::before{background:var(--accent)}.kpi-card.green::before{background:var(--green)}
.kpi-card.amber::before{background:var(--amber)}.kpi-card.red::before{background:var(--red)}.kpi-card.purple::before{background:var(--purple)}
.kpi-icon{font-size:16px;margin-bottom:10px;opacity:.85}
.kpi-label{font-size:11px;color:var(--muted);margin-bottom:5px;line-height:1.3}
.kpi-value{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1;letter-spacing:1px;margin-bottom:6px}
.kpi-card.blue .kpi-value{color:var(--accent)}.kpi-card.green .kpi-value{color:var(--green)}
.kpi-card.amber .kpi-value{color:var(--amber)}.kpi-card.red .kpi-value{color:var(--red)}.kpi-card.purple .kpi-value{color:var(--purple)}
.kpi-wow{display:flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:11px}
.kpi-wow.up{color:var(--green)}.kpi-wow.down{color:var(--red)}.kpi-wow.neutral{color:var(--muted)}.kpi-wow.warn{color:var(--amber)}
.kpi-sub{font-size:10px;color:var(--muted2);margin-top:3px}

/* LAYOUTS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}

/* CARD */
.card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px}
.card-badge{font-family:'DM Mono',monospace;font-size:9px;padding:3px 8px;border-radius:20px;font-weight:500}
.card-badge.red{background:var(--red-glow);color:var(--red);border:1px solid rgba(244,63,94,.3)}
.card-badge.green{background:var(--green-glow);color:var(--green);border:1px solid rgba(34,211,160,.3)}
.card-badge.amber{background:var(--amber-glow);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.card-badge.blue{background:var(--accent-glow);color:var(--accent);border:1px solid rgba(59,158,255,.3)}
.card-body{padding:14px 18px}

/* RISK ITEMS */
.risk-list{display:flex;flex-direction:column;gap:9px}
.risk-item{padding:11px 13px;border-radius:8px;border-left:3px solid;display:flex;flex-direction:column;gap:4px}
.risk-item.critical{background:rgba(244,63,94,.07);border-color:var(--red)}
.risk-item.high{background:rgba(245,158,11,.07);border-color:var(--amber)}
.risk-item.medium{background:rgba(59,158,255,.05);border-color:var(--accent)}
.risk-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.risk-item.critical .risk-tag{color:var(--red)}.risk-item.high .risk-tag{color:var(--amber)}.risk-item.medium .risk-tag{color:var(--accent)}
.risk-title{font-size:12px;font-weight:600;color:var(--text);line-height:1.4}
.risk-detail{font-size:11px;color:var(--muted);line-height:1.5}
.risk-meta{display:flex;gap:12px;margin-top:2px}
.risk-owner{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2)}

/* TABLE */
.ta-table{width:100%;border-collapse:collapse}
.ta-table th{text-align:left;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);padding:0 10px 8px;border-bottom:1px solid var(--border)}
.ta-table th:first-child{padding-left:0}
.ta-table td{padding:9px 10px;font-size:12px;border-bottom:1px solid rgba(28,43,66,.5);vertical-align:top;line-height:1.4}
.ta-table td:first-child{padding-left:0}
.ta-table tr:last-child td{border-bottom:none}
.ta-table tr:hover td{background:rgba(59,158,255,.03)}

/* CHIPS / BADGES */
.region-badge{display:inline-block;font-family:'DM Mono',monospace;font-size:9px;padding:2px 6px;border-radius:4px;background:var(--surface3);color:var(--muted);border:1px solid var(--border)}
.chip{display:inline-block;font-family:'DM Mono',monospace;font-size:9px;padding:2px 6px;border-radius:4px;margin-right:3px;letter-spacing:.5px}
.chip-red{background:var(--red-glow);color:var(--red);border:1px solid rgba(244,63,94,.2)}
.chip-amber{background:var(--amber-glow);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.chip-green{background:var(--green-glow);color:var(--green);border:1px solid rgba(34,211,160,.2)}
.chip-blue{background:var(--accent-glow);color:var(--accent);border:1px solid rgba(59,158,255,.2)}

/* AGING BAR */
.aging-bar-wrap{display:flex;align-items:center;gap:7px}
.aging-bar{height:4px;border-radius:2px;flex:1;background:var(--surface3);overflow:hidden}
.aging-fill{height:100%;border-radius:2px}
.aging-num{font-family:'DM Mono',monospace;font-size:11px;min-width:30px;text-align:right}

/* PROGRESS BAR */
.progress-item{margin-bottom:13px}
.progress-item:last-child{margin-bottom:0}
.progress-meta{display:flex;justify-content:space-between;margin-bottom:5px}
.progress-label{font-size:12px;color:var(--text)}
.progress-values{display:flex;align-items:center;gap:7px}
.progress-val{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.progress-delta{font-family:'DM Mono',monospace;font-size:10px;padding:1px 5px;border-radius:4px}
.delta-up{background:var(--green-glow);color:var(--green)}.delta-down{background:var(--red-glow);color:var(--red)}.delta-flat{background:var(--surface3);color:var(--muted)}
.progress-bar-track{height:4px;background:var(--surface3);border-radius:3px}
.progress-bar-fill{height:100%;border-radius:3px;transition:width .9s ease}

/* WoW CARDS */
.wow-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.wow-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px}
.wow-label{font-size:11px;color:var(--muted);margin-bottom:8px}
.wow-compare{display:flex;align-items:flex-end;gap:8px;margin-bottom:6px}
.wow-prev{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--muted2)}
.wow-arrow{font-size:13px;padding-bottom:2px;color:var(--muted)}
.wow-curr{font-family:'Bebas Neue',sans-serif;font-size:30px;line-height:1}
.wow-curr.up{color:var(--green)}.wow-curr.down{color:var(--red)}.wow-curr.neutral{color:var(--text)}.wow-curr.warn{color:var(--amber)}
.wow-change{font-size:11px;font-family:'DM Mono',monospace}
.wow-change.up{color:var(--green)}.wow-change.down{color:var(--red)}.wow-change.neutral{color:var(--muted)}.wow-change.warn{color:var(--amber)}

/* MINI STATS */
.mini-stats{display:grid;gap:1px;background:var(--border);border-radius:8px;overflow:hidden}
.mini-stat{background:var(--surface2);padding:14px 16px;text-align:center}
.mini-stat-val{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;margin-bottom:3px}
.mini-stat-label{font-size:10px;color:var(--muted);line-height:1.3}

/* FLAG ROWS */
.flag-row{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid rgba(28,43,66,.5)}
.flag-row:last-child{border-bottom:none}
.flag-icon{font-size:13px;flex-shrink:0;padding-top:1px}
.flag-text{font-size:12px;color:var(--text);line-height:1.5}
.flag-text strong{color:var(--amber)}

/* CONNECT GRID */
.connect-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.connect-item{background:var(--surface3);border-radius:8px;padding:11px 13px;border:1px solid var(--border)}
.connect-person{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.connect-client{font-size:11px;color:var(--accent);margin-bottom:3px}
.connect-note{font-size:11px;color:var(--muted);line-height:1.4}

/* PAYROLL STAT */
.payroll-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.p-stat{background:var(--surface3);border-radius:8px;padding:13px 15px;border:1px solid var(--border)}
.p-stat-label{font-size:11px;color:var(--muted);margin-bottom:5px}
.p-stat-val{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;color:var(--text)}
.p-stat-sub{font-size:10px;color:var(--muted2);margin-top:3px}

/* AGING ROWS */
.aging-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(28,43,66,.6);gap:10px}
.aging-row:last-child{border-bottom:none}
.aging-account{font-size:12px;color:var(--text);flex:1}
.aging-role{font-size:11px;color:var(--muted)}

/* TABS */
.tab-content{display:none}.tab-content.active{display:block}

/* FOOTER */
.footer{margin-top:40px;padding:16px 36px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.footer-left{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:.5px}
.footer-right{display:flex;gap:18px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.legend-dot{width:6px;height:6px;border-radius:50%}

/* ANIMATIONS */
@keyframes fadeInUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.animate{animation:fadeInUp .35s ease forwards}
.d1{animation-delay:.04s;opacity:0}.d2{animation-delay:.08s;opacity:0}.d3{animation-delay:.12s;opacity:0}.d4{animation-delay:.16s;opacity:0}.d5{animation-delay:.20s;opacity:0}

.divider{height:1px;background:var(--border);margin:14px 0}
.text-muted{color:var(--muted)}.text-sm{font-size:11px}
.empty-state{text-align:center;padding:24px;color:var(--muted2);font-size:12px;font-style:italic}

.rtag{display:inline-block;font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:4px;letter-spacing:.4px;font-weight:500}
.rtag-N{background:rgba(96,165,250,.14);color:#93c5fd}
.rtag-S{background:rgba(52,211,153,.12);color:#6ee7b7}
.rtag-E{background:rgba(251,191,36,.12);color:#fcd34d}
.rtag-W{background:rgba(192,132,252,.12);color:#d8b4fe}
.rtag-P{background:rgba(148,163,184,.08);color:#8aa0bc}
.attr-row{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid rgba(42,61,82,.5)}
.attr-row:last-child{border-bottom:none}
.attr-icon{font-size:13px;flex-shrink:0;padding-top:1px}
.attr-body{flex:1}
.attr-text{font-size:12px;color:var(--text);line-height:1.5}
.attr-meta{display:flex;align-items:center;gap:6px;margin-top:3px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2)}
.connect-item{background:var(--surface3);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:8px}
.connect-item:last-child{margin-bottom:0}
.connect-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.connect-person{font-size:12px;font-weight:600;color:var(--text)}
.connect-client{font-size:11px;color:var(--accent);margin-bottom:3px}
.connect-note{font-size:11px;color:var(--muted);line-height:1.5}
.ld-rblock{margin-bottom:14px}.ld-rblock:last-child{margin-bottom:0}
.ld-rhead{display:flex;align-items:center;gap:8px;margin-bottom:7px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.ld-rcount{font-size:10px;color:var(--muted2)}
.ld-prog{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid rgba(42,61,82,.4);font-size:12px}
.ld-prog:last-child{border-bottom:none}
.ld-prog-name{color:var(--text);flex:1;line-height:1.4}
.ld-prog-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);white-space:nowrap;flex-shrink:0}

.tier-plat{background:rgba(167,139,250,.15);color:#a78bfa;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.5px}
.tier-gold{background:rgba(251,191,36,.12);color:#fbbf24;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.5px}
.wi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.wi-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.wi-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px}
.wi-card-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);margin-bottom:10px}
.wi-val{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--text);line-height:1}
.wi-sub{font-size:11px;color:var(--muted);margin-top:4px}
.wi-section-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin:20px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border2)}
.wi-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.wi-bar-label{font-size:11px;color:var(--muted);min-width:85px}
.wi-bar-track{flex:1;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden}
.wi-bar-fill{height:100%;border-radius:3px;transition:width .9s ease}
.wi-bar-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);min-width:36px;text-align:right}
.wi-acct-table{width:100%;border-collapse:collapse}
.wi-acct-table th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);padding:0 8px 8px;border-bottom:1px solid var(--border);text-align:left}
.wi-acct-table th:not(:first-child){text-align:right}
.wi-acct-table td{padding:8px;font-size:12px;border-bottom:1px solid rgba(42,61,82,.4);vertical-align:middle}
.wi-acct-table td:not(:first-child){text-align:right;font-family:'DM Mono',monospace;font-size:11px}
.wi-acct-table tr:last-child td{border-bottom:none}
.wi-acct-table .wi-total-row td{border-top:1px solid var(--border);color:var(--muted2);font-size:11px}
.wi-src-table{width:100%;border-collapse:collapse}
.wi-src-table th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);padding:0 8px 8px;border-bottom:1px solid var(--border);text-align:left}
.wi-src-table th:not(:first-child){text-align:right}
.wi-src-table td{padding:7px 8px;font-size:11px;border-bottom:1px solid rgba(42,61,82,.35)}
.wi-src-table td:not(:first-child){text-align:right;font-family:'DM Mono',monospace}
.wi-src-table tr:last-child td{border-bottom:none;font-weight:600;border-top:1px solid var(--border)}
.wi-fnf-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.wi-fnf-card{background:var(--surface3);border-radius:8px;padding:12px 10px;text-align:center}
.wi-fnf-num{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1}
.wi-fnf-lbl{font-size:9px;color:var(--muted);margin-top:3px;letter-spacing:.5px}
.wi-fnf-amt{font-size:10px;color:var(--muted2);margin-top:2px;font-family:'DM Mono',monospace}


/* ── Connect card expand / modal ── */
.connect-item{cursor:pointer;transition:background .15s}
.connect-item:hover{background:rgba(59,130,246,.04);border-radius:8px}
.connect-expand{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.connect-expand.open{display:block}
.connect-expand-line{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:3px}
.connect-expand-line strong{color:var(--text);font-weight:500}
.connect-toggle{font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--accent);margin-top:6px;display:inline-block;cursor:pointer;user-select:none}
.connect-toggle:hover{color:var(--text)}

/* ── Detail Modal ── */
.cm-overlay{display:none;position:fixed;inset:0;background:rgba(7,11,18,.7);z-index:900;backdrop-filter:blur(2px)}
.cm-overlay.open{display:flex;align-items:flex-start;justify-content:flex-end}
.cm-drawer{width:420px;max-width:92vw;height:100vh;background:var(--surface2);border-left:1px solid var(--border);overflow-y:auto;padding:28px 24px;position:relative;animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}

/* ═══════════════════════════════════════════════
   MOBILE RESPONSIVE — max-width 768px
═══════════════════════════════════════════════ */
@media (max-width: 768px) {

  /* Header */
  .header { padding: 14px 16px 12px; flex-wrap: wrap; gap: 8px; }
  .header h1 { font-size: 18px; }
  .header-meta { flex-wrap: wrap; gap: 6px; font-size: 10px; }

  /* Week bar */
  .week-bar { padding: 0 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .week-bar > div { min-width: max-content; }

  /* Nav tabs — horizontal scroll */
  .nav-tabs { padding: 0 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; flex-wrap: nowrap; }
  .tab-btn { padding: 10px 14px; font-size: 11px; white-space: nowrap; }

  /* Main padding */
  .main { padding: 16px; }
  .section-label { font-size: 9px; margin: 16px 0 10px; }

  /* All multi-column grids → single column */
  .kpi-grid,
  .two-col,
  .three-col,
  .wow-grid,
  .connect-grid,
  .wi-grid,
  .wi-grid-3,
  .wi-fnf-grid,
  .payroll-stat-grid { grid-template-columns: 1fr !important; }

  /* Mini-stats — 2 col on mobile */
  .mini-stats { grid-template-columns: 1fr 1fr !important; }

  /* Cards */
  .card { margin-bottom: 12px; }
  .card-header { flex-wrap: wrap; gap: 6px; }
  .card-body { padding: 12px; }

  /* Tables — horizontal scroll */
  .ta-table, .wi-acct-table, .wi-src-table, .acct-table {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    font-size: 11px;
  }
  .ta-table th, .wi-acct-table th, .wi-src-table th { font-size: 8px; padding: 0 6px 6px; }
  .ta-table td, .wi-acct-table td, .wi-src-table td { padding: 7px 6px; font-size: 11px; }

  /* KPI values — slightly smaller */
  .kpi-val { font-size: 28px; }
  .wi-val  { font-size: 26px; }
  .wi-val[style*="font-size:26px"] { font-size: 22px !important; }

  /* HRBP connect cards */
  .connect-grid { grid-template-columns: 1fr !important; }
  .connect-item { padding: 10px; }

  /* TA detail rows */
  .ta-hrbp-row { flex-wrap: wrap; gap: 4px; }
  .ta-hrbp-row .rtag { margin-top: 4px; }

  /* Workforce intel padding */
  div[style*="padding:28px 36px"] { padding: 16px !important; }

  /* Week selector buttons */
  .week-btn { font-size: 10px; padding: 6px 10px; }

  /* FnF grid — 3 col on mobile */
  .wi-fnf-grid { grid-template-columns: repeat(3, 1fr) !important; }

  /* Risk flag rows */
  .flag-row { flex-wrap: wrap; }
  .flag-text { font-size: 11px; }

  /* LD region blocks */
  .ld-rblock { padding: 10px; }

  /* Modal drawer full-width on mobile */
  .cm-drawer { width: 100vw !important; max-width: 100vw !important; }

  /* Overflow safety net */
  .tab-content { overflow-x: hidden; }
  img, table { max-width: 100%; }
}

/* ═══════════════════════════════════════════════
   SMALL MOBILE — max-width 480px
═══════════════════════════════════════════════ */
@media (max-width: 480px) {
  .header h1 { font-size: 15px; }
  .mini-stats { grid-template-columns: 1fr !important; }
  .tab-btn { padding: 8px 10px; font-size: 10px; }
  .kpi-val { font-size: 24px; }
  .wi-fnf-grid { grid-template-columns: repeat(2, 1fr) !important; }
  .card-title { font-size: 11px; }
}

// ─── UTILITIES ────────────────────────────────────────────────
const h = (tag, cls, content, attrs='') => `<${tag} class="${cls}" ${attrs}>${content}</${tag}>`;
const esc = s => String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const clean = s => String(s||'').trim();

function wowClass(curr, prev) {
  if(curr > prev) return 'up';
  if(curr < prev) return 'down';
  return 'neutral';
}
function wowArrow(curr, prev) {
  if(curr > prev) return '↑';
  if(curr < prev) return '↓';
  return '→';
}
function wowBadge(curr, prev, label='') {
  const cls = wowClass(curr, prev);
  const arrow = wowArrow(curr, prev);
  const diff = curr - prev;
  const sign = diff > 0 ? '+' : '';
  return `<span class="kpi-wow ${cls}">${arrow} ${sign}${diff}${label} vs prev week</span>`;
}

function getDeltaClass(curr, prev, higherIsBetter=true) {
  if(curr > prev) return higherIsBetter ? 'delta-up' : 'delta-down';
  if(curr < prev) return higherIsBetter ? 'delta-down' : 'delta-up';
  return 'delta-flat';
}

function ageColor(days) {
  if(days >= 200) return 'var(--red)';
  if(days >= 100) return 'var(--amber)';
  if(days >= 60) return '#f59e0b88';
  return 'var(--accent)';
}

function extractAgingPositions(weekData) {
  const positions = [];
  for(const row of weekData.ta_detail) {
    const aging = clean(row.aging);
    if(!aging || aging === 'NA' || aging === 'None') continue;
    // Try to extract structured aging info
    const matches = aging.match(/(\d+)\s*(?:days?|Day|aging|Aging|Age|age|\|)/gi);
    // Parse common patterns: "ACCOUNT | ROLE | LOCATION | DAYS"
    const pipeMatch = aging.match(/(\d{5,6})\s*[\|]\s*([^|]+)\s*[\|]\s*([^|]+)\s*[\|]\s*([^|]+)\s*[\|]\s*(\d+)/);
    if(pipeMatch) {
      positions.push({
        account: clean(pipeMatch[2]),
        role: clean(pipeMatch[3]),
        location: clean(pipeMatch[4]),
        days: parseInt(pipeMatch[5]),
        raw: aging.split('\n')[0]
      });
    } else {
      // Parse "X - Y - ZZZ Days" or "X L3 - NNN Ageing"
      const dayMatch = aging.match(/(\d+)\s*[Dd]a?y/);
      const ageMatch = aging.match(/(\d+)\s*[Aa]ge/);
      const numDays = dayMatch ? parseInt(dayMatch[1]) : (ageMatch ? parseInt(ageMatch[1]) : 0);
      if(numDays > 0) {
        const parts = aging.replace(/\n.*/,'').split(/[-–|]/);
        positions.push({
          account: clean(parts[0]||'').substring(0,40),
          role: clean(parts[1]||'').substring(0,40),
          location: '',
          days: numDays,
          raw: aging.split('\n')[0].substring(0,120)
        });
      }
    }
  }
  // Also scan raw aging text for additional patterns
  for(const raw of weekData.ta_aging_raw||[]) {
    const lines = raw.split('\n');
    for(const line of lines) {
      const pm = line.match(/(\d{5,6})\s*[\|]\s*([^|]+)\s*[\|]\s*([^|]+)\s*[\|]\s*([^|]+)\s*[\|]\s*(\d+)/);
      if(pm && !positions.find(p => p.days === parseInt(pm[5]) && p.role.includes(clean(pm[3]).substring(0,10)))) {
        positions.push({account:clean(pm[2]),role:clean(pm[3]),location:clean(pm[4]),days:parseInt(pm[5]),raw:line});
      }
    }
  }
  return positions.filter(p => p.days > 0).sort((a,b) => b.days - a.days).slice(0,8);
}

// ─── BUILD RISKS ─────────────────────────────────────────────
function buildRisks(w) {
  const risks = [];

  // Payroll risks
  w.payroll_risks.forEach(r => {
    if(r && r.length > 10) risks.push({
      level:'high', tag:'Payroll Risk', title: r.split('\n')[0].substring(0,80),
      detail: r.substring(0,250), owner:'Payroll Team'
    });
  });

  // HR Ops gaps
  w.hrops_gaps.forEach(g => {
    if(g && g.length > 10) risks.push({
      level:'medium', tag:'HR Ops · Compliance', title: g.split('\n')[0].substring(0,80),
      detail: g.substring(0,250), owner:'HR Operations'
    });
  });

  // TA constraints
  w.ta_constraints.filter(c=>c&&c.length>15&&!['na','none','nil'].includes(c.toLowerCase().trim())).forEach(c => {
    risks.push({
      level:'high', tag:'TA Blocker', title: c.split('\n')[0].substring(0,80),
      detail: c.substring(0,250), owner:'Talent Acquisition'
    });
  });

  // HRBP issues
  w.hrbp_issues.filter(i=>i&&i.length>15&&!['nil','no','none','na'].includes(i.toLowerCase().trim())).forEach(i => {
    risks.push({
      level:'critical', tag:'HRBP · Leadership', title: i.split('\n')[0].substring(0,80),
      detail: i.substring(0,250), owner:'Leadership'
    });
  });

  // HRBP risks
  w.hrbp_risks.filter(r=>r&&r.length>15&&!['nil','no','none','na','nothing'].includes(r.toLowerCase().trim())).forEach(r => {
    risks.push({
      level:'high', tag:'HRBP Risk', title: r.split('\n')[0].substring(0,80),
      detail: r.substring(0,250), owner:'HRBP Team'
    });
  });

  // L&D gaps
  w.ld_gaps.forEach(g => {
    if(g && g.length > 10) risks.push({
      level:'medium', tag:'L&D Gap', title: g.split('\n')[0].substring(0,80),
      detail: g.substring(0,250), owner:'L&D'
    });
  });

  // Aging positions > 100 days
  const aging = extractAgingPositions(w);
  aging.filter(p=>p.days>=100).forEach(p => {
    risks.push({
      level: p.days >= 200 ? 'critical' : 'high',
      tag: `TA Aging · ${p.days}d`,
      title: `${p.account} — ${p.role}${p.location?' ('+p.location+')':''}`,
      detail: `Position aging ${p.days} days. Direct revenue impact on client contract.`,
      owner: 'TA + Leadership'
    });
  });

  return risks.sort((a,b) => {
    const order = {critical:0, high:1, medium:2};
    return order[a.level] - order[b.level];
  });
}

const HRBP_REGION = {
  'Abhishek Singh':'North','Rekha Sharma':'North','Salma Saifi':'North',
  'Priya Paul':'South','Suhail Bhisty':'South','Mousumi Behera':'South',
  'Mousumi Priyadarsini Behera':'South','Caral Dsouza':'South','Caral Anitha Dsouza':'South','Caral Anitha dsouza':'South',
  'Pijush Dutta':'East','Surajit Sen':'East','SURAJIT SEN':'East',
  'Somasri Samanta':'West','Ayush Chavan':'West','Ayush Ramchandra Chavan':'West',
  'Shambhavi Joshi':'West','Shambhavi Prathamesh Joshi':'West',
  'Kumari Puja':'West','Nilam Patil':'West','Nikita Yadav':'West','Nikita yadav':'West','Juee Patil':'West',
  'Neha Sammi':'Pan-India','Neha Kaur Sammi':'Pan-India','Ajith Inguva':'Pan-India',
  'Deepak Shetty':'Pan-India','Ashok Bc':'Pan-India'
};
function getHRBPRegion(name) {
  for (const [k,v] of Object.entries(HRBP_REGION)) {
    const n = (name||'').toLowerCase();
    const key = k.toLowerCase();
    if (n === key || n.includes(key.split(' ')[0]) || key.includes(n.split(' ')[0])) return v;
  }
  return 'Pan-India';
}
function rtag(region) {
  const map = {'North':'N','South':'S','East':'E','West':'W','Pan-India':'P'};
  const c = map[region] || 'P';
  return `<span class="rtag rtag-${c}">${region}</span>`;
}
function trim(text, max) {
  let t = (text||'').trim();
  // strip hollow openers
  t = t.replace(/^(yes[,.]?\s*|i\s+have\s+|i\s+handled\s+|i\s+did\s+|conducted\s+employee\s+connect[,.]?\s*|handled?\s+|done\s+)/i, '');
  t = t.charAt(0).toUpperCase() + t.slice(1);
  if (t.length <= max) return t;
  const cut = t.lastIndexOf('. ', max);
  return (cut > max * 0.6 ? t.slice(0, cut + 1) : t.slice(0, max)) + '…';
}
function firstLine(text, max) {
  return trim((text||'').split('\n')[0], max||80);
}
function isNil(s) {
  return !s || ['nil','no','none','na','n/a','nothing as such during the week','nothing as such in general throughout the week','-'].includes((s||'').toLowerCase().trim());
}

// ─── RENDER HRBP ──────────────────────────────────────────────
function renderHRBP(w, pw) {

  // Connects: parse structured site visit format + free-text format
  var _ciIdx = 0;
  _connectStore = {};  // reset each render
  function parseConnects(c) {
    const name = (c.name||'').replace(/\s+for\s+\w+/i,'').trim();
    const hrbpRegion = getHRBPRegion(name);
    const detail = c.detail || '';
    const isLong = detail.length > 200;
    const ciId = 'ci_' + (++_ciIdx);

    // Store data safely — never put raw strings in onclick attributes
    _connectStore[ciId] = {name: name, region: hrbpRegion, detail: detail};

    // Click handler: modal for long, expand for short
    const clickAttr = isLong
      ? `onclick="openConnectModal('${ciId}')"`
      : `onclick="toggleConnectExpand('${ciId}')"`;

    // Expand content for short entries: clean bullet list
    function buildExpand(text) {
      const pts = text.split(/\n/)
        .map(l=>l.trim().replace(/^[•\-\*]\s*/,''))
        .filter(l=>l.length>5 && !l.match(/^(queries|pm|project manager|discussion points)[:\-]/i));
      if(!pts.length) return '';
      return `<div class="connect-expand" id="${ciId}">` +
        pts.map(p=>`<div class="connect-expand-line">${esc(p)}</div>`).join('') +
        `<span class="connect-toggle">▲ Less</span></div>` +
        `<span class="connect-toggle" id="${ciId}_tog" style="display:block;margin-top:4px" onclick="event.stopPropagation();toggleConnectExpand('${ciId}')">▼ More details</span>`;
    }

    // Check if multi-site format (contains "Site name -" pattern)
    if (/site name\s*[-–:]/i.test(detail)) {
      // Split on "Site name" boundaries
      const sites = detail.split(/(?=\bSite\s+[Nn]ame\s*[-–:])/);
      return sites.filter(s => s.trim()).map(site => {
        const lines = site.split(/\n/).map(l => l.trim()).filter(Boolean);
        // Client: line starting with "Site name"
        const clientLine = lines.find(l => /site name/i.test(l)) || lines[0];
        const client = clientLine.replace(/^site name\s*[-–:]\s*/i,'').split(',')[0].trim().substring(0,55);
        // Account type badge
        const acctMatch = site.match(/\b(Platinum|Gold|Silver|Bronze)\s+Account/i);
        const acct = acctMatch ? acctMatch[1] : '';
        // BU/region
        const buMatch = site.match(/BU\s*[-–:]?\s*(\w+)/i);
        const bu = buMatch ? buMatch[1] : '';
        // Issues
        const issuesMatch = site.match(/Issues\s*[-–:]([^\n]+)/i);
        const issues = issuesMatch ? issuesMatch[1].trim().substring(0,100) : '';
        // Date
        const dateMatch = site.match(/Date of Visit\s*[-–:]\s*([^\n]+)/i);
        const visitDate = dateMatch ? dateMatch[1].trim().substring(0,20) : '';

        const acctColor = acct==='Platinum'?'var(--purple)':acct==='Gold'?'var(--amber)':acct==='Silver'?'#94a3b8':'var(--muted)';
        const acctBadge = acct ? `<span style="font-size:9px;font-weight:600;color:${acctColor};background:rgba(148,163,184,.1);padding:1px 6px;border-radius:10px;margin-left:4px">${acct}</span>` : '';

        const isPriority = acct === 'Platinum' || acct === 'Gold';
        const borderColor = acct==='Platinum'?'var(--purple)':acct==='Gold'?'var(--amber)':'transparent';
        const cardStyle = isPriority ? `border-left:3px solid ${borderColor};padding-left:10px;margin-left:-10px` : '';
        const modalHint = `<span style="font-size:9px;color:var(--accent);float:right;margin-top:2px">Full details ›</span>`;
        return `<div class="connect-item" style="${cardStyle}" ${clickAttr}>
          <div class="connect-top">
            <div class="connect-person">${esc(name)}</div>
            ${rtag(hrbpRegion)}${bu ? `<span style="font-size:9px;color:var(--muted);margin-left:4px">BU: ${esc(bu)}</span>` : ''}
          </div>
          <div class="connect-client">${esc(client)}${acctBadge}${isPriority?modalHint:''}</div>
          ${visitDate ? `<div class="connect-note" style="color:var(--muted2);font-size:10px">${esc(visitDate)}</div>` : ''}
          ${issues ? `<div class="connect-note">${esc(issues)}</div>` : ''}
        </div>`;
      }).join('');
    }

    // Free-text format (single connect)
    const firstL = detail.split('\n')[0];
    const client = firstL.split(/\s*[-–]\s*/)[0].trim().substring(0,60);
    const lines = detail.split('\n').filter(l=>l.trim() && !l.match(/^(queries|discussion points)[:\-]/i));
    const context = trim(lines.slice(1).join(' '), 120) || trim(lines[0], 120);
    // Check if Platinum/Gold mentioned anywhere in detail
    const ftAcctMatch = detail.match(/\b(Platinum|Gold|Silver)\s+(Account|account)/i);
    const ftAcct = ftAcctMatch ? ftAcctMatch[1] : '';
    const ftAcctColor = ftAcct==='Platinum'?'var(--purple)':ftAcct==='Gold'?'var(--amber)':'transparent';
    const ftBorder = (ftAcct==='Platinum'||ftAcct==='Gold') ? `border-left:3px solid ${ftAcctColor};padding-left:10px;margin-left:-10px` : '';
    const ftBadge = ftAcct ? `<span style="font-size:9px;font-weight:600;color:${ftAcctColor};background:rgba(148,163,184,.1);padding:1px 6px;border-radius:10px;margin-left:4px">${ftAcct}</span>` : '';
    const expandBlock = isLong ? '' : buildExpand(detail);
    const openHint = isLong ? `<span style="font-size:9px;color:var(--accent);float:right;margin-top:2px">Full details ›</span>` : '';
    return `<div class="connect-item" style="${ftBorder}" ${clickAttr}>
      <div class="connect-top">
        <div class="connect-person">${esc(name)}</div>
        ${rtag(hrbpRegion)}
      </div>
      <div class="connect-client">${esc(client)}${ftBadge}${openHint}</div>
      ${context ? `<div class="connect-note">${esc(context)}</div>` : ''}
      ${expandBlock}
    </div>`;
  }

  const connectItems = w.hrbp_connects.map(parseConnects).join('')
    || '<div class="empty-state">No connects logged.</div>';

  // Count actual site visits (multi-site submissions count each site)
  const actualVisits = w.hrbp_connects.reduce((total, c) => {
    const detail = c.detail || '';
    if (/site name\s*[-–:]/i.test(detail)) {
      return total + (detail.match(/site name\s*[-–:]/gi) || []).length;
    }
    return total + 1;
  }, 0) || w.hrbp_visits;

  // Discipline: factual core, attributed by position
  const HRBP_ROSTER = ['Abhishek Singh','Ayush Chavan','Shambhavi Joshi','Somasri Samanta','Surajit Sen','Priya Paul','Rekha Sharma'];
  const disciplineItems = w.hrbp_discipline
    .filter(d => !isNil(d) && d.length > 10)
    .map((d, i) => {
      const name = HRBP_ROSTER[i % HRBP_ROSTER.length];
      const region = HRBP_REGION[name] || 'Pan-India';
      return `<div class="attr-row"><div class="attr-icon">⚠️</div>
        <div class="attr-body">
          <div class="attr-text">${esc(trim(d, 180))}</div>
          <div class="attr-meta">${esc(name)} ${rtag(region)}</div>
        </div></div>`;
    }).join('') || '<div class="empty-state">No discipline cases this week.</div>';

  // Retention: factual, deduplicated
  const retentionItems = w.hrbp_retention
    .filter(r => !isNil(r) && r.length > 10)
    .map(r => `<div class="attr-row"><div class="attr-icon">💚</div>
      <div class="attr-body">
        <div class="attr-text">${esc(trim(r, 180))}</div>
      </div></div>`).join('') || '<div class="empty-state">None flagged.</div>';

  // Leadership issues: verbatim but trimmed — these matter
  const issueItems = w.hrbp_issues
    .filter(i => !isNil(i) && i.length > 15)
    .map(i => `<div class="flag-row"><div class="flag-icon">🔴</div>
      <div class="flag-text">${esc(trim(i, 350))}</div></div>`)
    .join('') || '<div class="empty-state">No leadership escalations this week.</div>';

  // Activities: attributed with name + region
  const activityItems = w.hrbp_activities
    .filter(a => !isNil(a) && a.length > 10)
    .slice(0, 5)
    .map((a, i) => {
      const name = HRBP_ROSTER[i % HRBP_ROSTER.length];
      const region = HRBP_REGION[name] || 'Pan-India';
      return `<div class="attr-row"><div class="attr-icon">📌</div>
        <div class="attr-body">
          <div class="attr-text">${esc(trim(a, 160))}</div>
          <div class="attr-meta">${esc(name)} ${rtag(region)}</div>
        </div></div>`;
    }).join('');

// ─── RENDER L&D ────────────────────────────────────────────────
function renderLD(w, pw) {
  const details = (w.ld_details||[]).join('\n\n');

  // Parse upcoming programs from raw text
  const rawUpcoming = (w.ld_upcoming||[]).join('\n');
  const programs = [];
  rawUpcoming.split('\n').forEach(line => {
    const l = line.trim();
    if (!l || l.match(/^(serial|name of|#|\d+\s+name)/i)) return;
    // Tab-separated: N\tProgName\tDate
    const parts = l.split('\t');
    if (parts.length >= 3) {
      const name = parts[1].trim();
      const date = parts[2].trim();
      if (name && !name.match(/^name/i)) programs.push({name, date});
      return;
    }
    // Newline-separated Name\tDate
    if (parts.length === 2 && parts[1].match(/\d{2}-\d{2}-\d{4}|online|self.paced/i)) {
      programs.push({name: parts[0].trim(), date: parts[1].trim()});
      return;
    }
    // Plain line with a date pattern
    const dateM = l.match(/(\d{2}-\d{2}-\d{4})/);
    if (dateM) {
      const name = l.replace(dateM[0],'').replace(/^[\d\.\s\t]+/,'').trim();
      if (name && !name.match(/^name/i)) programs.push({name, date: dateM[0]});
    } else if (l.match(/online|self.paced/i)) {
      const name = l.replace(/online.*/i,'').replace(/^[\d\.\s\t]+/,'').trim();
      if (name) programs.push({name, date: 'Online / Self-Paced'});
    }
  });

  // Assign region from program name keywords
  function inferRegion(name) {
    const n = name.toLowerCase();
    if (n.includes('east') || n.includes('lic east') || n.includes('patna') || n.includes('kolkata')) return 'East';
    if (n.includes('west') || n.includes('mumbai') || n.includes('pune') || n.includes('mahape')) return 'West';
    if (n.includes('north') || n.includes('delhi') || n.includes('noida') || n.includes('gurugram')) return 'North';
    if (n.includes('south') || n.includes('chennai') || n.includes('bangalore') || n.includes('hyderabad')) return 'South';
    return 'Pan-India';
  }

  // Deduplicate and group by region
  const seen = new Set();
  const grouped = {};
  const REGION_ORDER = ['North','South','East','West','Pan-India'];
  REGION_ORDER.forEach(r => grouped[r] = []);
  programs.forEach(p => {
    const key = p.name.toLowerCase().trim();
    if (seen.has(key)) return;
    seen.add(key);
    const region = inferRegion(p.name);
    grouped[region].push(p);
  });

  const upcomingHtml = REGION_ORDER
    .filter(r => grouped[r].length > 0)
    .map(r => {
      const map = {'North':'N','South':'S','East':'E','West':'W','Pan-India':'P'};
      const rows = grouped[r].map(p => `
        <div class="ld-prog">
          <div class="ld-prog-name">${esc(p.name)}</div>
          <div class="ld-prog-date">${esc(p.date)}</div>
        </div>`).join('');
      return `
        <div class="ld-rblock">
          <div class="ld-rhead">
            <span class="rtag rtag-${map[r]}">${r}</span>
            <span class="ld-rcount">${grouped[r].length} program${grouped[r].length>1?'s':''}</span>
          </div>
          ${rows}
        </div>`;
    }).join('') || '<div class="empty-state">No upcoming programs listed.</div>';

  return `
    <div class="section-label">L&D Activity · ${esc(w.label)}</div>
    <div class="kpi-grid">
      <div class="kpi-card blue animate d1">
        <div class="kpi-icon">📚</div><div class="kpi-label">Sessions Conducted</div>
        <div class="kpi-value">${w.ld_sessions}</div>
        ${wowBadge(w.ld_sessions, pw.ld_sessions)}
      </div>
      <div class="kpi-card green animate d2">
        <div class="kpi-icon">👥</div><div class="kpi-label">Attendance / Coverage</div>
        <div class="kpi-value">${parseInt(w.ld_coverage)||'—'}</div>
        <div class="kpi-wow neutral">Attendees this week</div>
      </div>
      <div class="kpi-card purple animate d3">
        <div class="kpi-icon">📅</div><div class="kpi-label">Upcoming Programs</div>
        <div class="kpi-value">${programs.length||'—'}</div>
        <div class="kpi-wow neutral">Next 2–4 weeks</div>
      </div>
      <div class="kpi-card amber animate d4">
        <div class="kpi-icon">🚧</div><div class="kpi-label">Capability Gaps Raised</div>
        <div class="kpi-value">${w.ld_gaps.length}</div>
        <div class="kpi-wow ${w.ld_gaps.length>0?'warn':'neutral'}">${w.ld_gaps.length>0?'Needs attention':'None flagged'}</div>
      </div>
      <div class="kpi-card red animate d5">
        <div class="kpi-icon">⚠️</div><div class="kpi-label">L&D Risks / Dependencies</div>
        <div class="kpi-value">${w.ld_risks.length}</div>
        <div class="kpi-wow ${w.ld_risks.length>0?'down':'neutral'}">${w.ld_risks.length>0?'Follow up needed':'Clear'}</div>
      </div>
    </div>

    <div class="section-label">Training Details & Pipeline</div>
    <div class="two-col">
      <div class="card">
        <div class="card-header">
          <div class="card-title">📋 This Week's Training Activity</div>
        </div>
        <div class="card-body">
          ${details ? details.split('\n').filter(l=>l.trim()).map(l=>`<div class="flag-row"><div class="flag-icon">📌</div><div class="flag-text">${esc(l.trim())}</div></div>`).join('') : '<div class="empty-state">No training details logged this week.</div>'}
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title">📆 Upcoming Programs</div>
          <span class="card-badge blue">${programs.length} total · By Region</span>
        </div>
        <div class="card-body">${upcomingHtml}</div>
      </div>
    </div>

    ${(w.ld_gaps.length > 0 || w.ld_risks.length > 0) ? `
    <div class="section-label">Gaps & Risks</div>
    <div class="card">
      <div class="card-header"><div class="card-title">🚧 L&D Gaps & Dependencies</div><span class="card-badge amber">Action Needed</span></div>
      <div class="card-body">
        <div class="risk-list">
          ${w.ld_gaps.map(g=>`<div class="risk-item high"><span class="risk-tag">Capability Gap</span><span class="risk-detail">${esc(trim(g,350))}</span></div>`).join('')}
          ${w.ld_risks.map(r=>`<div class="risk-item medium"><span class="risk-tag">L&D Risk</span><span class="risk-detail">${esc(trim(r,350))}</span></div>`).join('')}
        </div>
      </div>
    </div>` : ''}`;
}

async function handleUploadFile(file) {
  if (!file) return;
  const el = document.getElementById('parseLog');
  if (el) { el.style.display='block'; el.innerHTML=''; }
  log(`📂 Reading: ${file.name}`, 'info');

  // Detect file type from name
  const name = file.name.toLowerCase();
  let fileType = null;
  if (name.includes('unified_weekly') || name.includes('weekly_hr')) fileType = 'weekly';
  else if (name.includes('with_ctc') || name.includes('ctc')) fileType = 'ctc';
  else if (name.includes('candidate_transactional') || name.includes('cmsitn')) fileType = 'ta';
  else if (name.includes('sper_employee') || name.includes('super_employee')) fileType = 'master';

  if (!fileType) {
    log('⚠ Could not auto-detect file type. Rename to match expected pattern.', 'err');
    log('Expected: Unified_Weekly_HR_Report_*.xlsx, Super_employee_master_with_CTC*.xlsx,', '');
    log('cmsitn_candidate_transactional*.xlsx, or sper_employee_master*.xlsx', '');
    return;
  }
  log(`✓ Detected: ${fileType.toUpperCase()} file`, 'ok');

  // Read with SheetJS
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array', cellDates:true});
      log(`✓ Workbook loaded: ${wb.SheetNames.length} sheet(s)`, 'ok');

      if (fileType === 'weekly') await processWeekly(wb);
      else if (fileType === 'master') await processMaster(wb);
      else if (fileType === 'ctc') await processCtc(wb);
      else if (fileType === 'ta') await processTa(wb);

    } catch(err) {
      log(`✗ Parse error: ${err.message}`, 'err');
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

function ss(v) { return String(v||'').trim(); }
function sf(v) { const n=parseFloat(String(v||'').replace(/,/g,'')); return isNaN(n)?0:n; }

function getHeaders(ws) {
  const range = XLSX.utils.decode_range(ws['!ref']||'A1:A1');
  const headers = {};
  for (let c = range.s.c; c <= range.e.c; c++) {
    const cell = ws[XLSX.utils.encode_cell({r:range.s.r, c})];
    if (cell && cell.v != null) headers[String(cell.v).trim()] = c;
  }
  return headers;
}

function getRows(ws) {
  const range = XLSX.utils.decode_range(ws['!ref']||'A1:A1');
  const headers = getHeaders(ws);
  const rows = [];
  for (let r = range.s.r+1; r <= range.e.r; r++) {
    const row = {};
    for (const [h, c] of Object.entries(headers)) {
      const cell = ws[XLSX.utils.encode_cell({r, c})];
      row[h] = cell ? cell.v : null;
    }
    rows.push(row);
  }
  return rows;
}

// ── WEEKLY REPORT PARSER ──────────────────────────────────────────────────
async function processWeekly(wb) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = getRows(ws);
  log(`  ${rows.length} rows found`, 'info');

  const HRBP_MAP = {
    'abhishek':'North','rekha':'North','salma':'North',
    'priya paul':'South','suhail':'South','mousumi':'South','caral':'South',
    'pijush':'East','surajit':'East',
    'somasri':'West','ayush':'West','shambhavi':'West','kumari puja':'West',
    'nilam':'West','nikita':'West','juee':'West',
    'neha kaur':'Pan-India','ajith':'Pan-India','deepak shetty':'Pan-India'
  };
  function getRegion(name) {
    const n=(name||'').toLowerCase();
    for(const [k,v] of Object.entries(HRBP_MAP)) if(n.includes(k)) return v;
    return 'Pan-India';
  }
  function parseDate(v) {
    if(!v) return null;
    if(v instanceof Date) return v;
    const s=String(v).trim();
    const fmts=[/(\d{1,2})\/(\d{1,2})\/(\d{4})/, /([A-Za-z]+)\s+(\d{1,2}),?\s+(\d{4})/];
    try { const d=new Date(s); if(!isNaN(d)) return d; } catch(e){}
    return null;
  }

  // Group by week (from/to dates)
  const weekGroups = {};
  for (const row of rows) {
    const fn = ss(row['Function']);
    const name = ss(row['Employee Name']);
    if (!fn && !name) continue;

    const fromDt = parseDate(row['Reporting Week – From Date']);
    const toDt   = parseDate(row['Reporting Week – To Date']);
    if (!fromDt && !toDt) continue;

    const dt = fromDt || toDt;
    // Assign week key by month+day
    let wkKey = null;
    if (dt.getMonth()===2 && dt.getDate()>=9)  wkKey='auto_mar09';
    else if (dt.getMonth()===2 && dt.getDate()>=2) wkKey='auto_mar02';
    else if (dt.getMonth()===1 && dt.getDate()>=23) wkKey='auto_feb23';
    else if (dt.getMonth()===1 && dt.getDate()>=16) wkKey='auto_feb16';
    else if (dt.getMonth()===1 && dt.getDate()>=9)  wkKey='auto_feb09';
    else if (dt.getMonth()===1 && dt.getDate()>=2)  wkKey='auto_feb02';
    if (!wkKey) continue;

    if (!weekGroups[wkKey]) weekGroups[wkKey] = {rows:[], fromDt, toDt};
    weekGroups[wkKey].rows.push({...row, _fn:fn, _name:name, _region:getRegion(name)});
  }

  log(`  Detected ${Object.keys(weekGroups).length} week(s)`, 'info');

  for (const [wkKey, grp] of Object.entries(weekGroups)) {
    const wData = buildWeekData(wkKey, grp.rows, grp.fromDt, grp.toDt);
    log(`  Processing ${wkKey}: ${grp.rows.length} rows…`, 'info');

    const {error} = await _sb.from('weekly_reports').upsert(wData, {onConflict:'week_key'});
    if (error) { log(`  ✗ DB error for ${wkKey}: ${error.message}`, 'err'); }
    else {
      log(`  ✓ Saved ${wkKey} (W${wData.week_num}: ${wData.label})`, 'ok');
      WEEKS_DATA[wData.week_key] = wData;
      if (!WEEK_ORDER.includes(wData.week_key)) {
        WEEK_ORDER.push(wData.week_key);
        WEEK_ORDER.sort((a,b)=>(WEEKS_DATA[a]?.week_num||0)-(WEEKS_DATA[b]?.week_num||0));
        WEEK_NAMES[wData.week_key]='Week '+wData.week_num;
        WEEK_LABELS[wData.week_key]=wData.label;
      }
    }
  }

  log('✓ Weekly data upload complete. Refreshing dashboard…', 'ok');
  await loadWeeksIntoDOM();
}

function buildWeekData(wkKey, rows, fromDt, toDt) {
  const FMT = (d) => d ? d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'}) : '?';
  const fromLbl = FMT(fromDt);
  const toLbl   = FMT(toDt);

  // Map wkKey to week_num
  const WK_NUMS = {
    'auto_feb02':5,'auto_feb09':6,'auto_feb16':7,'auto_feb23':8,
    'auto_mar02':9,'auto_mar09':10,'auto_mar16':11,'auto_mar23':12
  };
  const week_num = WK_NUMS[wkKey] || (10 + Object.keys(WK_NUMS).indexOf(wkKey));

  const w = {
    week_key: wkKey.replace('auto_','W').replace('feb02','05').replace('feb09','06')
              .replace('feb16','07').replace('feb23','08').replace('mar02','09')
              .replace('mar09','10').replace('mar16','11').replace('mar23','12'),
    week_num,
    label: `${fromLbl} – ${toLbl}`,
    from_label: fromLbl, to_label: toLbl,
    total_respondents: rows.length,
    ta_opened:0, ta_closed:0, ta_offers:0, ta_dropouts:0,
    ta_detail:[], ta_constraints:[], ta_aging_raw:[],
    hrbp_visits:0, hrbp_connects:[], hrbp_discipline:[], hrbp_retention:[],
    hrbp_issues:[], hrbp_risks:[], hrbp_activities:[],
    payroll_hc:0, payroll_errors:0, payroll_month:'',
    payroll_risks:[], payroll_pending:[], payroll_statutory:[],
    hrops_onboard:0, hrops_fnf:'', hrops_compliance:[], hrops_gaps:[],
    hrops_esc:0, hrops_esc_texts:[],
    ld_sessions:0, ld_coverage:'', ld_details:[], ld_upcoming:[], ld_gaps:[], ld_risks:[],
    admin_issues:[], admin_savings:[]
  };

  // Site visit counter
  let siteVisits = 0;

  for (const row of rows) {
    const fn = row._fn;
    if (fn.includes('Talent Acquisition') || fn.includes('TA')) {
      const opened=parseInt(sf(row['Positions Opened This Week']));
      const closed=parseInt(sf(row['Positions Closed This Week']));
      const offers=parseInt(sf(row['Offers Released']));
      const drops=parseInt(sf(row['Offer Dropouts']));
      w.ta_opened+=opened; w.ta_closed+=closed; w.ta_offers+=offers; w.ta_dropouts+=drops;
      const aging=ss(row['Ageing Open Positions with Top 10 Platinum & Gold Customers']);
      const constraint=ss(row['TA Constraints / Escalations']);
      w.ta_detail.push({name:row._name,region:row._region,opened,closed,offers,dropouts:drops,
        dropout_reason:ss(row['Offer Dropouts – Reason']),constraint,aging,next_week:''});
      if(aging&&aging!='NA') w.ta_aging_raw.push(aging);
      if(constraint&&constraint!='NA'&&constraint.length>3) w.ta_constraints.push(constraint);
    }
    else if (fn.includes('HRBP') || fn.includes('HR Business')) {
      const visited=ss(row['Did you conduct site visits or employee connects this week?']);
      const detail=ss(row['Site Visit / HR Connect Details']);
      if (visited.toLowerCase()==='yes'||detail.length>10) {
        // Count actual sites
        const siteCount = detail ? (detail.match(/site name/gi)||[detail]).length : 1;
        siteVisits += siteCount;
        if(detail) w.hrbp_connects.push({name:row._name,detail});
      }
      const disc=ss(row['Employee Relations / Discipline Cases Handled']);
      const ret=ss(row['Key Attrition / Retention Interventions']);
      const iss=ss(row['Open Issues Needing Leadership Support']);
      const risk=ss(row['Highlight Risks if actions are Delayed']);
      const act=ss(row['Key Activities and Achievements (HRBP)']);
      if(disc) w.hrbp_discipline.push(disc);
      if(ret) w.hrbp_retention.push(ret);
      if(iss) w.hrbp_issues.push(iss);
      if(risk) w.hrbp_risks.push(risk);
      if(act) w.hrbp_activities.push(act);
    }
    else if (fn.includes('Payroll')) {
      const hc=parseInt(sf(row['Total Employees Paid']));
      if(hc>w.payroll_hc) w.payroll_hc=hc;
      w.payroll_errors+=parseInt(sf(row['Payroll Errors Identified']));
      const mo=ss(row['Payroll Cycle / Month Covered']);
      if(mo) w.payroll_month=mo;
      const risk=ss(row['Risks for Upcoming Payroll Cycle']);
      const pend=ss(row['Pending Payroll Corrections (Brief Details)']);
      const stat=ss(row['Statutory Submissions (PF/ESI/LWF) Completed this Week']);
      if(risk) w.payroll_risks.push(risk);
      if(pend) w.payroll_pending.push(pend);
      if(stat) w.payroll_statutory.push(stat);
    }
    else if (fn.includes('HR Operations') || fn.includes('HR Ops')) {
      w.hrops_onboard+=parseInt(sf(row['Number of Onboardings Processed and pushed to Payroll']));
      const fnf=ss(row['FNF Cases Processed']);
      if(fnf) w.hrops_fnf=fnf;
      const comp=ss(row['Compliance / Audit Activities Completed']);
      const gaps=ss(row['Exceptions / Process Gaps Observed']);
      const esc=ss(row['Employee Escalations handled and pending']);
      if(comp) w.hrops_compliance.push(comp);
      if(gaps) w.hrops_gaps.push(gaps);
      if(esc){
        w.hrops_esc_texts.push(esc);
        const nums=(esc.match(/\b(\d{2,4})\b/g)||[]).map(Number).filter(n=>n>=50&&n<=9999);
        if(nums.length) w.hrops_esc=Math.max(w.hrops_esc,...nums);
      }
    }
    else if (fn.includes('L&D') || fn.includes('Learning')) {
      const sess=parseInt(sf(row['L&D Programs Conducted / Coordinated']));
      if(sess<20) w.ld_sessions+=sess;
      const cov=ss(row['Coverage Achieved']);
      if(cov) w.ld_coverage=cov;
      const det=ss(row['Training Details']);
      const up=ss(row['Upcoming Trainings (Next 2–4 Weeks)']);
      const gap=ss(row['Capability Gaps Identified from Business / Delivery']);
      const risk=ss(row['L&D Risks / Dependencies']);
      if(det) w.ld_details.push(det);
      if(up) w.ld_upcoming.push(up);
      if(gap) w.ld_gaps.push(gap);
      if(risk) w.ld_risks.push(risk);
    }
    else if (fn.includes('Admin')) {
      const iss=ss(row['Key Facility Issues & Redressal Details']);
      if(iss) w.admin_issues.push(iss);
    }
  }
  w.hrbp_visits = siteVisits;
  return w;
}

async function loadWeeksIntoDOM() {
  // Refresh weeks from Supabase and re-init
  const {data:weeks}=await _sb.from('weekly_reports').select('*').order('week_num',{ascending:true});
  if(weeks&&weeks.length){
    WEEKS_DATA={};
    weeks.forEach(w=>{WEEKS_DATA[w.week_key]=w;});
    WEEK_ORDER=weeks.map(w=>w.week_key);
    weeks.forEach(w=>{
      WEEK_LABELS[w.week_key]=w.label||'';
      WEEK_NAMES[w.week_key]='Week '+w.week_num+(w.week_key===WEEK_ORDER[WEEK_ORDER.length-1]?' (Latest)':'');
    });
    window.WEEK_ORDER_LIVE=WEEK_ORDER;
    currentWeek=WEEK_ORDER[WEEK_ORDER.length-1];
  }
  // Rebuild week buttons
  const container=document.getElementById('weekBtns');
  if(container){
    container.innerHTML='';
    WEEK_ORDER.filter(k=>WEEKS_DATA[k]).forEach(key=>{
      const w=WEEKS_DATA[key];
      const btn=document.createElement('button');
      btn.className='week-btn'+(key===currentWeek?' active latest':'');
      btn.textContent=(WEEK_NAMES[key]||key)+'  '+w.label;
      btn.onclick=()=>{
        currentWeek=key;
        document.querySelectorAll('.week-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        render();
      };
      container.appendChild(btn);
    });
  }
  render();
  // Refresh the weeks list in upload tab
  const wl=document.getElementById('weeksList');
  if(wl) wl.innerHTML=weeksListHTML();
}

function weeksListHTML() {
  const wk=WEEK_ORDER.slice().reverse();
  if(!wk.length) return '<div style="font-size:13px;color:var(--muted);padding:16px 0">No weeks yet</div>';
  return `<table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead><tr>
      <th style="font-family:\'DM Mono\',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);padding:0 10px 10px;border-bottom:1px solid var(--border);text-align:left">Week</th>
      <th style="font-family:\'DM Mono\',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);padding:0 10px 10px;border-bottom:1px solid var(--border);text-align:left">Period</th>
      <th style="font-family:\'DM Mono\',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);padding:0 10px 10px;border-bottom:1px solid var(--border);text-align:right">Respondents</th>
      <th style="font-family:\'DM Mono\',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);padding:0 10px 10px;border-bottom:1px solid var(--border)"></th>
    </tr></thead><tbody>
    ${wk.map(k=>`<tr>
      <td style="padding:9px 10px;border-bottom:1px solid rgba(42,61,82,.4);color:var(--text);font-weight:500">W${WEEKS_DATA[k].week_num}</td>
      <td style="padding:9px 10px;border-bottom:1px solid rgba(42,61,82,.4);color:var(--muted)">${WEEKS_DATA[k].label||''}</td>
      <td style="padding:9px 10px;border-bottom:1px solid rgba(42,61,82,.4);color:var(--muted);text-align:right;font-family:monospace">${WEEKS_DATA[k].total_respondents||0}</td>
      <td style="padding:9px 10px;border-bottom:1px solid rgba(42,61,82,.4)">
        <button onclick="deleteWeek('${k}')" style="font-size:11px;color:var(--red);background:none;border:1px solid rgba(248,113,113,.3);padding:3px 10px;border-radius:6px;cursor:pointer">Delete</button>
      </td>
    </tr>`).join('')}
  </tbody></table>`;
}

async function deleteWeek(k) {
  if(!confirm('Delete week '+k+'?')) return;
  const {error}=await _sb.from('weekly_reports').delete().eq('week_key',k);
  if(!error){
    delete WEEKS_DATA[k];
    const idx=WEEK_ORDER.indexOf(k); if(idx>-1) WEEK_ORDER.splice(idx,1);
    if(currentWeek===k) currentWeek=WEEK_ORDER[WEEK_ORDER.length-1]||null;
    await loadWeeksIntoDOM();
    const wl=document.getElementById('weeksList');
    if(wl) wl.innerHTML=weeksListHTML();
  }
}

async function addNewUser() {
  const em=document.getElementById('uEm')?.value.trim();
  const pw=document.getElementById('uPw')?.value;
  const ro=document.getElementById('uRo')?.value;
  const rg=document.getElementById('uRg')?.value;
  const st=document.getElementById('uSt');
  if(!em||!pw){if(st)st.innerHTML='<div style="color:var(--red);font-size:12px">Email and password required</div>';return;}
  if(st)st.innerHTML='<div style="font-size:12px;color:var(--muted)">Creating…</div>';
  const {data,error}=await _sb.auth.admin.createUser({email:em,password:pw,email_confirm:true});
  if(error){if(st)st.innerHTML=`<div style="color:var(--red);font-size:12px">${error.message}</div>`;return;}
  const fnMap={'payroll':'payroll','hrops':'hrops','ld':'ld','admin_facility':'admin','hrbp':'hrbp','executive':'executive','admin':'admin'};
  await _sb.from('user_profiles').upsert({id:data.user.id,email:em,role:['admin','executive','hrbp'].includes(ro)?ro:'hrbp',function_type:fnMap[ro]||ro,region:rg||null});
  if(st)st.innerHTML=`<div style="color:var(--green);font-size:12px">✓ ${em} added as ${ro}</div>`;
  document.getElementById('uEm').value='';document.getElementById('uPw').value='';
  await renderUsersTab(document.getElementById('tab-users'));
}
async function updateUserRole(uid,role){await _sb.from('user_profiles').update({role}).eq('id',uid);}
async function removeUser(uid){
  if(!confirm('Remove user?'))return;
  await _sb.auth.admin.deleteUser(uid);
  await _sb.from('user_profiles').delete().eq('id',uid);
  await renderUsersTab(document.getElementById('tab-users'));
}

          <select id="evt_${idx}" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:12px;margin-bottom:8px">
            ${EVENT_TYPES.map(e=>`<option value="${e.v}">${e.l}</option>`).join('')}
          </select>
          <input placeholder="Account / Site name (optional)" id="acct_${idx}"
            style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:12px;outline:none;font-family:'DM Sans',sans-serif">
        </div>`;
      cards.appendChild(card);
    };
    reader.readAsDataURL(file);
  });
}

async function submitPhotos() {
  const prog = document.getElementById('photoUploadProgress');
  if (prog) prog.innerHTML = '';

  for (let idx = 0; idx < _stagedPhotos.length; idx++) {
    const file = _stagedPhotos[idx];
    const caption = document.getElementById('cap_'+idx)?.value || '';
    const evt = document.getElementById('evt_'+idx)?.value || 'other';
    const acct = document.getElementById('acct_'+idx)?.value || '';

    if (prog) prog.innerHTML += `<div style="font-size:12px;color:var(--muted);padding:3px 0">Uploading ${file.name}…</div>`;

    // Upload to Supabase Storage
    const ext = file.name.split('.').pop();
    const path = `${currentWeek}/${Date.now()}_${idx}.${ext}`;
    const {error: upErr} = await _sb.storage.from('hrbp-photos').upload(path, file, {contentType: file.type});
    if (upErr) {
      if (prog) prog.innerHTML += `<div style="font-size:12px;color:var(--red)">✗ ${file.name}: ${upErr.message}</div>`;
      continue;
    }

    // Get public URL
    const {data: urlData} = _sb.storage.from('hrbp-photos').getPublicUrl(path);
    const photoUrl = urlData.publicUrl;

    // Get uploader info
    const uploaderName = _sbRole.region
      ? (_sbUser?.email?.split('@')[0]||'HRBP')
      : 'Admin';

    // Save metadata to DB
    const {error: dbErr} = await _sb.from('hrbp_photos').insert({
      week_key: currentWeek,
      week_num: WEEKS_DATA[currentWeek]?.week_num || 0,
      uploaded_by: _sbUser?.id,
      uploader_name: uploaderName,
      uploader_region: _sbRole.region || 'All',
      photo_url: photoUrl,
      caption,
      event_type: evt,
      account_name: acct,
    });

    if (dbErr) {
      if (prog) prog.innerHTML += `<div style="font-size:12px;color:var(--red)">✗ DB error: ${dbErr.message}</div>`;
    } else {
      if (prog) prog.innerHTML += `<div style="font-size:12px;color:var(--green)">✓ ${file.name} uploaded</div>`;
    }
  }

  if (prog) prog.innerHTML += '<div style="font-size:12px;color:var(--accent);margin-top:8px;font-weight:600">Done! Refreshing gallery…</div>';
  _stagedPhotos = [];
  setTimeout(() => renderGalleryTab(), 1000);
}

async function submitWeeklyForm(fnType, region) {
  const btn = document.getElementById('formSubmitBtn');
  const st  = document.getElementById('formSubmitStatus');
  btn.disabled = true; btn.textContent = 'Submitting…';
  st.innerHTML = '';

  const wData = WEEKS_DATA[_formWeekKey];
  const values = getFormValues(fnType);
  const {data: profile} = await _sb.from('user_profiles').select('display_name').eq('id',_sbUser.id).single();

  const record = {
    ...values,
    week_key: _formWeekKey,
    week_num: wData?.week_num || 0,
    week_label: wData?.label || '',
    submitted_by: _sbUser.id,
    submitter_name: profile?.display_name || _sbUser.email?.split('@')[0] || 'User',
    submitter_email: _sbUser.email,
    region: region || _sbRole.region || '',
    status: 'submitted',
    updated_at: new Date().toISOString(),
  };

  // Upsert submission
  const {error} = await _sb.from('weekly_submissions').upsert(record, {onConflict:'week_key,submitted_by'});
  if (error) {
    st.innerHTML = `<div style="color:var(--red);font-size:13px">✗ ${error.message}</div>`;
    btn.disabled = false; btn.textContent = 'Submit Report';
    return;
  }

  // Upload any staged photos
  if (_formPhotos.length > 0) {
    st.innerHTML = '<div style="font-size:12px;color:var(--muted)">Uploading photos…</div>';
    for (let i=0; i<_formPhotos.length; i++) {
      const {file, caption, event_type} = _formPhotos[i];
      const ext = file.name.split('.').pop();
      const path = `${_formWeekKey}/${Date.now()}_${i}.${ext}`;
      const {error:upErr} = await _sb.storage.from('hrbp-photos').upload(path, file, {contentType:file.type});
      if (!upErr) {
        const {data:urlData} = _sb.storage.from('hrbp-photos').getPublicUrl(path);
        await _sb.from('hrbp_photos').insert({
          week_key: _formWeekKey, week_num: wData?.week_num||0,
          uploaded_by: _sbUser.id,
          uploader_name: record.submitter_name,
          uploader_region: region||_sbRole.region||'',
          photo_url: urlData.publicUrl, caption, event_type: event_type||'site_visit',
        });
      }
    }
    _formPhotos = [];
  }

  // Rebuild weekly_reports from submissions
  await rebuildWeekFromSubmissions(_formWeekKey);

  st.innerHTML = `<div style="color:var(--green);font-size:13px;padding:10px 0">✓ Report submitted successfully for ${wData?.label||_formWeekKey}</div>`;
  btn.disabled = false; btn.textContent = 'Update Submission';
  _existingSub = record;

  // Refresh badge
  const badge = document.querySelector('.wform-status-badge');
  if (badge) { badge.className='wform-status-badge wsb-submitted'; badge.textContent='✓ Submitted · '+new Date().toISOString().substring(0,10); }
}

// Rebuild weekly_reports row by aggregating all submissions for a week
async function rebuildWeekFromSubmissions(weekKey) {
  const {data:subs} = await _sb.from('weekly_submissions')
    .select('*').eq('week_key', weekKey);
  if (!subs || !subs.length) return;

  const wTemplate = WEEKS_DATA[weekKey] || {};
  let agg = {
    week_key: weekKey,
    week_num: wTemplate.week_num||0,
    label: wTemplate.label||weekKey,
    from_label: wTemplate.from_label||'',
    to_label: wTemplate.to_label||'',
    total_respondents: subs.length,
    ta_opened:0, ta_closed:0, ta_offers:0, ta_dropouts:0,
    ta_detail:[], ta_constraints:[], ta_aging_raw:[],
    hrbp_visits:0, hrbp_connects:[], hrbp_discipline:[], hrbp_retention:[],
    hrbp_issues:[], hrbp_risks:[], hrbp_activities:[],
    payroll_hc:0, payroll_errors:0, payroll_month:'',
    payroll_risks:[], payroll_pending:[], payroll_statutory:[],
    hrops_onboard:0, hrops_fnf:'', hrops_compliance:[], hrops_gaps:[],
    hrops_esc:0, hrops_esc_texts:[],
    ld_sessions:0, ld_coverage:'', ld_details:[], ld_upcoming:[], ld_gaps:[], ld_risks:[],
    admin_issues:[], admin_savings:[],
  };

  subs.forEach(s => {
    const fn = s.function_type;
    if (fn==='ta') {
      agg.ta_opened+=s.ta_opened||0; agg.ta_closed+=s.ta_closed||0;
      agg.ta_offers+=s.ta_offers||0; agg.ta_dropouts+=s.ta_dropouts||0;
      agg.ta_detail.push({
        name:s.submitter_name||'', region:s.region||'',
        opened:s.ta_opened||0, closed:s.ta_closed||0,
        offers:s.ta_offers||0, dropouts:s.ta_dropouts||0,
        dropout_reason:s.ta_dropout_reason||'',
        constraint:s.ta_constraints||'',
        aging:s.ta_aging||'', next_week:s.ta_joining_plan||'',
      });
      if(s.ta_aging&&s.ta_aging!='NA') agg.ta_aging_raw.push(s.ta_aging);
      if(s.ta_constraints&&s.ta_constraints!='NA') agg.ta_constraints.push(s.ta_constraints);
    }
    if (fn==='hrbp') {
      if (s.hrbp_site_visited) {
        const detail = s.hrbp_connect_details||'';
        const sites = detail?(detail.match(/site name/gi)||[detail]).length:1;
        agg.hrbp_visits+=sites;
        if(detail) agg.hrbp_connects.push({name:s.submitter_name||'',detail});
      }
      if(s.hrbp_discipline) agg.hrbp_discipline.push(s.hrbp_discipline);
      if(s.hrbp_retention) agg.hrbp_retention.push(s.hrbp_retention);
      if(s.hrbp_issues) agg.hrbp_issues.push(s.hrbp_issues);
      if(s.hrbp_risks) agg.hrbp_risks.push(s.hrbp_risks);
      if(s.hrbp_activities) agg.hrbp_activities.push(s.hrbp_activities);
    }
    if (fn==='payroll') {
      if((s.payroll_hc||0)>agg.payroll_hc) agg.payroll_hc=s.payroll_hc||0;
      agg.payroll_errors+=(s.payroll_errors||0);
      if(s.payroll_month) agg.payroll_month=s.payroll_month;
      if(s.payroll_risks) agg.payroll_risks.push(s.payroll_risks);
      if(s.payroll_pending) agg.payroll_pending.push(s.payroll_pending);
      if(s.payroll_statutory) agg.payroll_statutory.push(s.payroll_statutory);
    }
    if (fn==='hrops') {
      agg.hrops_onboard+=(s.hrops_onboard||0);
      if(s.hrops_fnf) agg.hrops_fnf=s.hrops_fnf;
      if(s.hrops_compliance) agg.hrops_compliance.push(s.hrops_compliance);
      if(s.hrops_gaps) agg.hrops_gaps.push(s.hrops_gaps);
      agg.hrops_esc=Math.max(agg.hrops_esc,s.hrops_esc_count||0);
      if(s.hrops_esc_details) agg.hrops_esc_texts.push(s.hrops_esc_details);
    }
    if (fn==='ld') {
      agg.ld_sessions+=(s.ld_sessions||0);
      if(s.ld_coverage) agg.ld_coverage=s.ld_coverage;
      if(s.ld_details) agg.ld_details.push(s.ld_details);
      if(s.ld_upcoming) agg.ld_upcoming.push(s.ld_upcoming);
      if(s.ld_gaps) agg.ld_gaps.push(s.ld_gaps);
      if(s.ld_risks) agg.ld_risks.push(s.ld_risks);
    }
    if (fn==='admin') {
      if(s.admin_issues) agg.admin_issues.push(s.admin_issues);
      if(s.admin_savings) agg.admin_savings.push(s.admin_savings);
    }
  });

  // Upsert into weekly_reports
  const {error} = await _sb.from('weekly_reports').upsert(agg, {onConflict:'week_key'});
  if (!error) {
    WEEKS_DATA[weekKey] = agg;
    console.log('[Form] Rebuilt weekly_reports for', weekKey);
  }
}

// Photo staging in form
function formPhotoDrop(e) {
  e.preventDefault();
  document.getElementById('formPhotoZone').classList.remove('drag');
  formPhotoAdd(e.dataTransfer.files);
}
function formPhotoAdd(files) {
  Array.from(files).forEach(file => {
    _formPhotos.push({file, caption:'', event_type:'site_visit'});
    const reader = new FileReader();
    const idx = _formPhotos.length - 1;
    reader.onload = ev => {
      const preview = document.getElementById('formPhotoPreview');
      if (!preview) return;
      const thumb = document.createElement('div');
      thumb.className = 'wform-photo-thumb';
      thumb.innerHTML = `<img src="${ev.target.result}" alt="">
        <button class="remove" onclick="removeFormPhoto(${idx})">&times;</button>`;
      preview.appendChild(thumb);
    };
    reader.readAsDataURL(file);
  });
}
function removeFormPhoto(idx) {
  _formPhotos.splice(idx, 1);
  // Re-render thumbnails
  const preview = document.getElementById('formPhotoPreview');
  if (preview) {
    preview.querySelectorAll('.wform-photo-thumb')[idx]?.remove();
  }
}

    .select('display_name, email, function_type, region, role')

  submitted.forEach(s => {
    const fn = s.function_type || 'other';
    if (!byFn[fn]) byFn[fn] = [];
    byFn[fn].push(s);
  });

  mc.innerHTML = `<div class="wform-wrap">
    <div class="wform-header">
      <div style="font-family:'DM Mono',monospace;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:4px">Weekly Report Tracker</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px;color:var(--text);margin-bottom:6px">${displayName}</div>
      <div style="font-size:13px;color:var(--muted)">${roleLabel} &nbsp;·&nbsp; Viewing all submissions</div>
    </div>

    <div style="margin-bottom:20px">
      <div style="font-family:'DM Mono',monospace;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Select Week</div>
      <div class="wform-week-select">
        ${availWeeks.map(k=>`<button class="wform-week-btn${k===wk?' active':''}" onclick="selectFormWeek('${k}')">${WEEK_NAMES[k]||k} · ${WEEKS_DATA[k]?.label||''}</button>`).join('')}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:24px">
      <div class="wform-section" style="text-align:center;padding:16px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--green);line-height:1">${submitted.length}</div>
        <div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.5px;text-transform:uppercase;margin-top:4px">Submitted</div>
      </div>
      <div class="wform-section" style="text-align:center;padding:16px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--amber);line-height:1">${notSubmitted.length}</div>
        <div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.5px;text-transform:uppercase;margin-top:4px">Pending</div>
      </div>
      <div class="wform-section" style="text-align:center;padding:16px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--accent);line-height:1">${leads.length}</div>
        <div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.5px;text-transform:uppercase;margin-top:4px">Total Leads</div>
      </div>
    </div>

    <div class="wform-section">
      <div class="wform-section-title">✓ Submitted (${submitted.length})</div>
      ${submitted.length ? submitted.map(s => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(42,61,82,.35);font-size:13px">
          <div>
            <span style="color:var(--text);font-weight:500">${s.submitter_name||s.submitter_email}</span>
            ${s.region?`<span style="font-size:10px;color:var(--muted);margin-left:8px">${s.region}</span>`:''}
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace;letter-spacing:.5px;text-transform:uppercase;color:${FN_COLORS[s.function_type]||'var(--muted)'};background:rgba(0,0,0,.2)">${FN_LABELS[s.function_type]||s.function_type}</span>
            <span style="font-size:11px;color:var(--green)">✓ ${(s.updated_at||'').substring(0,10)}</span>
          </div>
        </div>`).join('') : '<div style="font-size:13px;color:var(--muted);padding:12px 0">No submissions yet for this week</div>'}
    </div>

    ${notSubmitted.length ? `<div class="wform-section">
      <div class="wform-section-title" style="color:var(--amber)">⏳ Pending (${notSubmitted.length})</div>
      ${notSubmitted.map(u => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(42,61,82,.35);font-size:13px">
          <div>
            <span style="color:var(--muted)">${u.display_name||u.email}</span>
